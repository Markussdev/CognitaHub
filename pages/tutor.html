<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel do Tutor | Cognita Hub</title>
  <link rel="icon" type="image/png" href="../assets/logo-icon-transparent.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Baloo+2:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #26051F; --ink-soft: #625363;
      --paper: #FCF7F1; --surface: #FFFEFC;
      --workspace: #F7F4FF; --workspace-2: #F3F7FF; --sidebar-bg: #FFF9EF;
      --brand: #141162; --brand-deep: #540042; --brand-soft: #EDEBFF; --brand-mist: rgba(20,17,98,.055);
      --accent: #FFA800;
      --ok: #1C7C54; --warn: #B3590A; --bad: #A3123A;
      --ok-soft: rgba(28,124,84,.10); --warn-soft: rgba(179,89,10,.10); --bad-soft: rgba(163,18,58,.08);
      --border: rgba(20,17,98,.10); --border-strong: rgba(20,17,98,.18);
      --shadow-soft: 0 1px 2px rgba(35,2,32,.04), 0 14px 38px rgba(20,17,98,.055);
      --shadow-card: 0 1px 2px rgba(35,2,32,.05), 0 18px 44px rgba(20,17,98,.07);
      --r-sm: 8px; --r: 12px; --r-lg: 14px; --r-xl: 18px; --r-pill: 999px;
      --s1: 8px; --s2: 16px; --s3: 24px; --s4: 32px;
      --font: "Atkinson Hyperlegible", system-ui, -apple-system, "Segoe UI", sans-serif;
      --display: "Baloo 2", var(--font);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font); color: var(--ink);
      background:
        radial-gradient(circle at 78% 12%, rgba(20,17,98,.08), transparent 34%),
        radial-gradient(circle at 18% 72%, rgba(255,168,0,.10), transparent 30%),
        linear-gradient(120deg, var(--paper) 0%, var(--workspace) 58%, var(--workspace-2) 100%);
      background-attachment: fixed;
      font-size: 16px; line-height: 1.55;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }
    :focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 6px; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }

    /* ── Topbar ── */
    .tp-topbar {
      position: sticky; top: 0; z-index: 40;
      background: rgba(252,247,241,.92); backdrop-filter: blur(12px) saturate(1.1);
      border-bottom: 1px solid var(--border);
    }
    .tp-topbar-inner {
      display: flex; align-items: center; gap: var(--s2);
      height: 56px; max-width: 1280px; margin: 0 auto; padding: 0 var(--s3);
    }
    .tp-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); flex-shrink: 0; }
    .tp-brand-mark {
      width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center;
      background: var(--brand); overflow: hidden; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(20,17,98,.2);
    }
    .tp-brand-mark img { width: 76%; height: 76%; object-fit: contain; }
    .tp-brand-copy strong { display: block; font-family: var(--display); font-size: .9rem; color: var(--ink); }
    .tp-brand-copy small { display: block; font-size: .7rem; color: var(--ink-soft); font-weight: 700; }
    .tp-topbar-center { flex: 1; min-width: 0; padding: 0 var(--s2); }
    .tp-greeting { font-size: .88rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink-soft); }
    .tp-topbar-actions { display: flex; align-items: center; gap: var(--s1); flex-shrink: 0; }

    /* Botões da topbar */
    .tp-btn-primary {
      display: inline-flex; align-items: center; gap: 7px;
      min-height: 36px; padding: 0 var(--s2); border: none; border-radius: var(--r-pill);
      background: var(--accent); color: var(--ink);
      font-family: var(--font); font-size: .84rem; font-weight: 700; cursor: pointer; white-space: nowrap;
      box-shadow: 0 3px 12px rgba(255,168,0,.28);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .tp-btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,168,0,.4); }
    .tp-btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    [hidden] { display: none !important; }
    .tp-btn-primary svg { width: 15px; height: 15px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .tp-icon-btn {
      display: grid; place-items: center; width: 36px; height: 36px; flex-shrink: 0;
      border: 1px solid var(--border); border-radius: var(--r-pill);
      background: var(--surface); color: var(--ink-soft); cursor: pointer;
      transition: border-color .15s ease;
    }
    .tp-icon-btn:hover { border-color: var(--border-strong); }
    .tp-icon-btn svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tp-avatar {
      display: grid; place-items: center; width: 36px; height: 36px; flex-shrink: 0;
      border-radius: var(--r-pill); background: var(--brand); color: #fff;
      font-weight: 700; font-size: .82rem;
    }
    .tp-focus-dot {
      position: relative; width: 22px; height: 13px; border-radius: var(--r-pill);
      background: rgba(20,17,98,.16); transition: background .2s ease;
    }
    .tp-focus-dot::after {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--ink-soft); transition: transform .2s ease, background .2s ease;
    }
    [aria-pressed="true"] .tp-focus-dot { background: rgba(255,168,0,.2); }
    [aria-pressed="true"] .tp-focus-dot::after { transform: translateX(9px); background: var(--accent); }

    /* ── Status strip ── */
    .tp-strip {
      display: flex; align-items: center; gap: var(--s2);
      padding: 8px var(--s3); border-bottom: 1px solid var(--border);
      background: var(--surface); font-size: .82rem; color: var(--ink-soft);
    }
    .tp-strip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tp-strip-dot--pending { background: var(--warn); animation: tp-pulse 2s ease infinite; }
    .tp-strip-dot--ok      { background: var(--ok); }
    .tp-strip-dot--info    { background: var(--brand); }
    .tp-strip-dot--bad     { background: var(--bad); }
    @keyframes tp-pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    .tp-strip strong { color: var(--ink); }

    /* ── Layout principal: sidebar + conteúdo ── */
    .tp-workspace {
      display: flex; max-width: 1280px; margin: 0 auto;
      min-height: calc(100vh - 56px); align-items: start;
    }

    /* ── Sidebar ── */
    .tp-sidebar {
      width: 272px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: var(--s3) var(--s2);
      position: sticky; top: 56px;
      max-height: calc(100vh - 56px);
      overflow-y: auto; scrollbar-width: thin;
      background:
        radial-gradient(circle at 20% 12%, rgba(255,168,0,.08), transparent 34%),
        var(--sidebar-bg);
    }

    /* Seção do tutor */
    .tp-sb-tutor { display: flex; align-items: flex-start; gap: 12px; margin-bottom: var(--s3); }
    .tp-sb-avatar {
      width: 42px; height: 42px; flex-shrink: 0; border-radius: 50%;
      background: var(--brand); color: #fff; font-weight: 700; font-size: 1rem;
      display: grid; place-items: center;
    }
    .tp-sb-name { font-size: .9rem; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
    .tp-sb-role { font-size: .73rem; color: var(--ink-soft); }
    .tp-sb-chip {
      display: inline-flex; align-items: center; gap: 5px;
      min-height: 20px; padding: 0 8px; margin-top: 5px;
      border-radius: var(--r-pill); font-size: .69rem; font-weight: 700;
    }
    .tp-sb-chip i { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .tp-sb-chip--ok   { background: var(--ok-soft);   color: var(--ok); }
    .tp-sb-chip--warn { background: var(--warn-soft); color: var(--warn); }
    .tp-sb-chip--info { background: rgba(20,17,98,.07); color: var(--brand); }

    .tp-sb-divider { height: 1px; background: var(--border); margin: var(--s2) 0; }
    .tp-sb-section-label {
      font-size: .66rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .09em; color: var(--ink-soft); margin-bottom: 8px;
    }

    /* Criança na sidebar */
    .tp-sb-child-name {
      font-family: var(--display); font-size: 1.05rem; font-weight: 700;
      color: var(--brand-deep); line-height: 1.2; margin-bottom: 3px;
    }
    .tp-sb-child-meta { font-size: .79rem; color: var(--ink-soft); margin-bottom: var(--s2); }

    /* Widget micro do ciclo */
    .tp-cycle-widget {
      background: rgba(20,17,98,.04); border-radius: var(--r-sm);
      padding: 10px 12px; margin-bottom: var(--s2);
    }
    .tp-cycle-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .tp-cycle-month-num {
      font-family: var(--display); font-size: 1.45rem; font-weight: 700;
      color: var(--brand); line-height: 1; font-feature-settings: "tnum";
    }
    .tp-cycle-month-of { font-size: .73rem; color: var(--ink-soft); }
    .tp-cycle-track { display: flex; gap: 3px; margin-bottom: 4px; }
    .tp-cycle-seg         { flex: 1; height: 4px; border-radius: 2px; background: rgba(20,17,98,.1); }
    .tp-cycle-seg--done   { background: rgba(255,168,0,.5); }
    .tp-cycle-seg--active { background: var(--accent); }
    .tp-cycle-stat { font-size: .71rem; color: var(--ink-soft); }

    /* Links na sidebar */
    .tp-sb-links { display: flex; flex-direction: column; }
    .tp-sb-link {
      display: flex; align-items: center; gap: 9px; padding: 9px 0;
      color: var(--brand); font-size: .83rem; font-weight: 700; text-decoration: none;
      border-bottom: 1px solid var(--border); transition: color .15s;
    }
    .tp-sb-link:last-child { border-bottom: none; }
    .tp-sb-link:hover { color: var(--brand-deep); }
    .tp-sb-link svg {
      width: 14px; height: 14px; flex-shrink: 0; fill: none;
      stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .tp-sb-empty { font-size: .83rem; color: var(--ink-soft); line-height: 1.55; }

    /* Skeleton da sidebar */
    .tp-sb-skeleton-avatar { width: 42px; height: 42px; border-radius: 50%; }
    .tp-sb-skeleton-line   { height: 13px; border-radius: 5px; margin-bottom: 8px; }
    .tp-sb-skeleton-line-sm{ height: 10px; border-radius: 4px; width: 65%; }

    /* ── Área de conteúdo ── */
    .tp-content {
      flex: 1; min-width: 0;
      padding: var(--s3) var(--s3) 100px;
      background-image: radial-gradient(rgba(20,17,98,.038) 1px, transparent 1px);
      background-size: 24px 24px;
      background-position: -6px -6px;
    }

    /* ── Blocks genéricos ── */
    .tp-block {
      background: rgba(255,254,252,.88);
      border: 1px solid rgba(20,17,98,.09);
      border-radius: var(--r-lg); padding: var(--s3);
      box-shadow: 0 1px 2px rgba(35,2,32,.035);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin-bottom: var(--s2);
    }
    .tp-block-label {
      font-size: .69rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--ink-soft); margin-bottom: var(--s2);
    }
    .tp-block-title {
      font-family: var(--display); font-size: 1.05rem; font-weight: 700;
      color: var(--ink); line-height: 1.25; margin-bottom: var(--s2);
    }

    /* Block de ação: acento amarelo no topo + gradiente interno */
    .tp-block--action {
      border-top: 3px solid var(--accent);
      background:
        radial-gradient(circle at 92% 0%, rgba(255,168,0,.12), transparent 32%),
        linear-gradient(180deg, #FFFFFF 0%, #FFFCF7 100%);
      box-shadow: var(--shadow-soft);
    }

    /* Título do bloco de ação tem mais presença */
    .tp-block--action .tp-block-title {
      font-size: 1.4rem; color: var(--brand-deep);
    }

    /* Botão de abrir form dentro do bloco de ação — secundário, não compete com topbar */
    .tp-block--action .tp-btn-register {
      background: transparent;
      border: 1.5px solid rgba(20,17,98,.22);
      color: var(--brand);
      box-shadow: none;
      font-size: .84rem; min-height: 36px;
    }
    .tp-block--action .tp-btn-register:hover {
      background: rgba(20,17,98,.06);
      transform: none; box-shadow: none;
    }

    /* Infos da próxima sessão */
    .tp-next-info { display: grid; gap: 6px; margin-bottom: var(--s2); }
    .tp-next-row  { display: flex; align-items: baseline; gap: 8px; font-size: .88rem; }
    .tp-next-row strong { color: var(--ink-soft); font-weight: 700; flex-shrink: 0; }
    .tp-next-row span   { color: var(--ink); }
    .tp-next-empty { font-size: .86rem; color: var(--ink-soft); line-height: 1.55; margin-bottom: var(--s2); }

    /* Botão de registrar sessão (dentro do bloco) */
    .tp-btn-register {
      display: inline-flex; align-items: center; gap: 7px;
      min-height: 40px; padding: 0 var(--s3); border: none; border-radius: var(--r-pill);
      background: var(--accent); color: var(--ink);
      font-family: var(--font); font-size: .88rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 3px 12px rgba(255,168,0,.28);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .tp-btn-register:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,168,0,.4); }
    .tp-btn-register svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Skeleton ── */
    .tp-skeleton {
      border-radius: var(--r-lg);
      background: linear-gradient(100deg, #ede9e3 40%, #f5f1ec 50%, #ede9e3 60%);
      background-size: 200% 100%; animation: tp-shimmer 1.4s ease infinite;
    }
    @keyframes tp-shimmer { 0% { background-position: 100% 50%; } 100% { background-position: -100% 50%; } }
    .tp-skeleton--hero  { height: 160px; margin-bottom: var(--s2); }
    .tp-skeleton--panel { height: 110px; margin-bottom: var(--s2); }

    /* ── Card de status (estados sem ciclo) ── */
    .tp-status-card {
      display: flex; align-items: flex-start; gap: var(--s3);
      padding: var(--s4); background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-card);
    }
    .tp-status-icon {
      width: 48px; height: 48px; flex-shrink: 0; border-radius: var(--r);
      display: grid; place-items: center;
    }
    .tp-status-icon svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .tp-status-icon--pending { background: var(--warn-soft); color: var(--warn); }
    .tp-status-icon--ok      { background: var(--ok-soft);   color: var(--ok); }
    .tp-status-icon--info    { background: rgba(20,17,98,.07); color: var(--brand); }
    .tp-status-icon--bad     { background: var(--bad-soft);  color: var(--bad); }
    .tp-status-body { flex: 1; min-width: 0; }
    .tp-status-kicker { font-size: .71rem; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .08em; }
    .tp-status-title { font-family: var(--display); font-size: 1.3rem; font-weight: 700; line-height: 1.15; margin: 5px 0 10px; }
    .tp-status-body > p { color: var(--ink-soft); font-size: .9rem; line-height: 1.6; max-width: 54ch; }
    .tp-lib-link {
      display: inline-block; margin-top: var(--s2);
      color: var(--brand); font-weight: 700; font-size: .9rem; text-decoration: none;
    }
    .tp-lib-link:hover { text-decoration: underline; }

    /* Timeline de candidatura */
    .tp-steps { list-style: none; display: flex; flex-direction: column; margin-top: var(--s3); }
    .tp-step { display: flex; align-items: flex-start; gap: var(--s2); padding-bottom: var(--s2); position: relative; }
    .tp-step::before { content: ""; position: absolute; left: 15px; top: 32px; bottom: 0; width: 2px; background: var(--border); }
    .tp-step:last-child::before { display: none; }
    .tp-step-dot {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%; display: grid; place-items: center;
      border: 2px solid var(--border); background: var(--paper); font-size: .78rem; font-weight: 700; color: var(--ink-soft);
    }
    .tp-step-dot--done   { border-color: var(--ok);     background: var(--ok-soft);           color: var(--ok); }
    .tp-step-dot--active { border-color: var(--accent);  background: rgba(255,168,0,.1);        color: var(--brand); }
    .tp-step-copy { padding-top: 5px; }
    .tp-step-copy strong { display: block; font-size: .9rem; color: var(--ink); }
    .tp-step-copy span   { font-size: .84rem; color: var(--ink-soft); }

    /* Etapas de orientação */
    .tp-orient-steps { margin-top: var(--s3); display: grid; gap: var(--s2); }
    .tp-orient-step {
      display: flex; align-items: flex-start; gap: var(--s2);
      padding: var(--s2); border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--paper);
    }
    .tp-orient-num {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
      background: rgba(20,17,98,.08); color: var(--brand);
      display: grid; place-items: center; font-size: .82rem; font-weight: 700;
    }
    .tp-orient-copy { flex: 1; min-width: 0; }
    .tp-orient-copy strong { display: block; font-size: .9rem; color: var(--ink); margin-bottom: 2px; }
    .tp-orient-copy span   { font-size: .82rem; color: var(--ink-soft); }

    /* ── Timeline de sessões ── */
    .tp-session-list { display: grid; gap: var(--s3); }
    .tp-session-item { position: relative; padding-left: 22px; }
    .tp-session-item::before { content: ""; position: absolute; left: 2px; top: 7px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .tp-session-item::after  { content: ""; position: absolute; left: 5px; top: 18px; bottom: calc(-1 * var(--s3)); width: 2px; background: var(--border); }
    .tp-session-list .tp-session-item:last-child::after { display: none; }
    .tp-session-date  { font-size: .7rem; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em; }
    .tp-session-title { font-size: .92rem; font-weight: 700; color: var(--ink); margin: 2px 0 3px; }
    .tp-session-note  { font-size: .82rem; color: var(--ink-soft); margin: 3px 0; line-height: 1.45; }
    .tp-session-tag {
      display: inline-flex; align-items: center; min-height: 19px; padding: 0 7px;
      border-radius: var(--r-pill); font-size: .68rem; font-weight: 700; margin-top: 4px;
    }
    .tp-session-tag--reg { background: rgba(20,17,98,.07); color: var(--brand); }
    .tp-session-tag--vis { background: var(--ok-soft); color: var(--ok); }
    .tp-empty { color: var(--ink-soft); font-size: .88rem; }
    .tp-empty strong { display: block; font-size: .9rem; color: var(--ink); margin-bottom: 4px; }

    /* ── Formulário de sessão ── */
    .tp-session-form > summary {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px var(--s2); border: 1px solid var(--border); border-radius: var(--r);
      background: rgba(20,17,98,.03); color: var(--ink);
      font-family: var(--font); font-size: .88rem; font-weight: 700;
      cursor: pointer; list-style: none; user-select: none;
    }
    .tp-session-form > summary::-webkit-details-marker { display: none; }
    .tp-session-form > summary:hover { border-color: var(--brand); }
    .tp-session-form > summary svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s ease; }
    .tp-session-form[open] > summary { border-radius: var(--r) var(--r) 0 0; border-color: var(--brand); }
    .tp-session-form[open] > summary svg { transform: rotate(180deg); }
    .tp-form-body {
      border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--r) var(--r);
      padding: var(--s3); background: var(--surface); display: grid; gap: var(--s3);
    }
    .tp-form-section-title {
      font-size: .7rem; font-weight: 700; color: var(--ink-soft);
      text-transform: uppercase; letter-spacing: .08em;
      padding-bottom: var(--s1); border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .tp-form-row   { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: var(--s2); }
    .tp-form-row-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: var(--s2); }
    .tp-field { display: grid; gap: 6px; }
    .tp-field label { font-size: .79rem; font-weight: 700; color: var(--ink-soft); }
    .tp-field input, .tp-field textarea, .tp-field select {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--r-sm);
      background: var(--paper); color: var(--ink); font-family: var(--font); font-size: .9rem;
      transition: border-color .15s ease;
    }
    .tp-field input:focus-visible, .tp-field textarea:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; border-color: var(--brand); }
    .tp-field textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
    .tp-scale { display: flex; flex-wrap: wrap; gap: 6px; }
    .tp-scale-btn {
      display: inline-flex; align-items: center; min-height: 32px; padding: 0 10px;
      border: 1px solid var(--border); border-radius: var(--r-pill);
      background: var(--paper); color: var(--ink-soft);
      font-family: var(--font); font-size: .78rem; font-weight: 700; cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
    }
    .tp-scale-btn:hover { border-color: var(--brand); color: var(--brand); }
    .tp-scale-btn.selected       { border-color: var(--brand); background: rgba(20,17,98,.08); color: var(--brand); }
    .tp-scale-btn--ok.selected   { border-color: var(--ok);   background: var(--ok-soft);   color: var(--ok); }
    .tp-scale-btn--warn.selected { border-color: var(--warn); background: var(--warn-soft); color: var(--warn); }
    .tp-scale-btn--bad.selected  { border-color: var(--bad);  background: var(--bad-soft);  color: var(--bad); }
    .tp-family-guide {
      font-size: .83rem; color: var(--ink-soft); line-height: 1.55; padding: var(--s2);
      border-radius: var(--r-sm); background: rgba(20,17,98,.04); border-left: 3px solid var(--brand);
    }
    .tp-family-guide strong { color: var(--brand); display: block; margin-bottom: 4px; }
    .tp-family-guide em { font-size: .81rem; color: var(--ok); font-style: normal; display: block; margin-top: 6px; }
    .tp-char-count { font-size: .73rem; color: var(--ink-soft); text-align: right; margin-top: 4px; }
    .tp-checklist { list-style: none; display: grid; gap: 8px; }
    .tp-checklist li { display: flex; align-items: flex-start; gap: 9px; }
    .tp-checklist input[type="checkbox"] { width: 17px; height: 17px; flex-shrink: 0; margin-top: 1px; accent-color: var(--brand); cursor: pointer; }
    .tp-checklist label { font-size: .86rem; color: var(--ink-soft); cursor: pointer; line-height: 1.4; }
    .tp-internal-wrap { border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; }
    .tp-internal-label {
      display: flex; align-items: center; gap: 8px; padding: 8px var(--s2);
      background: rgba(20,17,98,.04); border-bottom: 1px solid var(--border);
      font-size: .73rem; font-weight: 700; color: var(--ink-soft);
    }
    .tp-internal-label svg { width: 12px; height: 12px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tp-internal-wrap textarea { display: block; width: 100%; padding: var(--s2); border: none; background: var(--surface); color: var(--ink); font-family: var(--font); font-size: .88rem; min-height: 65px; resize: vertical; line-height: 1.5; }
    .tp-internal-wrap textarea:focus-visible { outline: 2px solid var(--brand); outline-offset: -2px; }
    .tp-form-actions { display: flex; align-items: center; flex-wrap: wrap; gap: var(--s2); }
    .tp-btn-save {
      display: inline-flex; align-items: center; gap: 7px;
      min-height: 40px; padding: 0 var(--s3); border: none; border-radius: var(--r-pill);
      background: var(--brand); color: #fff;
      font-family: var(--font); font-size: .88rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 3px 12px rgba(20,17,98,.22); transition: transform .15s, box-shadow .15s;
    }
    .tp-btn-save:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(20,17,98,.3); }
    .tp-btn-save:disabled { opacity: .5; cursor: not-allowed; }
    .tp-form-ok    { font-size: .88rem; color: var(--ok); font-weight: 700; }
    .tp-form-error { font-size: .88rem; color: var(--bad); font-weight: 700; }

    /* ── Plano (somente leitura) ── */
    .tp-plan-entry { padding: 9px 0; border-bottom: 1px solid var(--border); }
    .tp-plan-entry:last-of-type { border-bottom: none; }
    .tp-plan-key { font-size: .68rem; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 3px; }
    .tp-plan-val { font-size: .9rem; color: var(--ink); line-height: 1.45; }
    .tp-btn-suggest {
      display: inline-flex; align-items: center; gap: 6px; margin-top: var(--s2);
      min-height: 30px; padding: 0 12px; border-radius: var(--r-pill);
      border: 1px solid var(--border); background: var(--paper);
      color: var(--ink-soft); font-family: var(--font); font-size: .78rem; font-weight: 700; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .tp-btn-suggest:hover { border-color: var(--brand); color: var(--brand); }

    /* ── Atividade sugerida ── */
    .tp-activity-note { font-size: .88rem; color: var(--ink-soft); line-height: 1.55; margin-bottom: var(--s2); }
    .tp-activity-link {
      display: inline-flex; align-items: center; gap: 6px;
      min-height: 30px; padding: 0 12px; border-radius: var(--r-pill);
      border: 1px solid var(--border-strong);
      color: var(--brand); font-size: .8rem; font-weight: 700; text-decoration: none;
      transition: background .15s;
    }
    .tp-activity-link:hover { background: rgba(20,17,98,.05); }

    /* ── Ciclo pausado ── */
    .tp-paused-banner {
      display: flex; gap: var(--s2); align-items: flex-start;
      padding: var(--s3); border-radius: var(--r-lg);
      background: var(--warn-soft); border: 1px solid rgba(179,89,10,.2);
    }
    .tp-paused-banner svg { width: 22px; height: 22px; flex-shrink: 0; margin-top: 2px; fill: none; stroke: var(--warn); stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .tp-paused-banner strong { display: block; font-size: .95rem; color: var(--warn); margin-bottom: 4px; }
    .tp-paused-banner p { font-size: .88rem; color: var(--ink-soft); margin: 0; }

    /* ── Erro ── */
    .tp-error-card { text-align: center; padding: var(--s4); }
    .tp-error-card strong { display: block; font-size: 1.05rem; color: var(--bad); margin-bottom: 6px; }
    .tp-error-card p { font-size: .9rem; color: var(--ink-soft); margin-bottom: var(--s3); }
    .tp-btn-retry {
      display: inline-flex; align-items: center; gap: 7px; min-height: 38px; padding: 0 var(--s3);
      border: 1px solid var(--border-strong); border-radius: var(--r-pill);
      background: var(--surface); color: var(--brand);
      font-family: var(--font); font-size: .88rem; font-weight: 700; cursor: pointer;
    }
    .tp-btn-retry:hover { background: rgba(20,17,98,.05); }

    /* ── FAB mobile ── */
    .tp-fab {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 50; display: none; align-items: center; gap: 8px;
      min-height: 50px; padding: 0 var(--s4); border: none; border-radius: var(--r-pill);
      background: var(--accent); color: var(--ink);
      font-family: var(--font); font-size: .95rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 8px 24px rgba(255,168,0,.4); white-space: nowrap;
    }
    .tp-fab svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    @media (max-width: 680px) { .tp-fab { display: inline-flex; } }

    /* ── Modo Foco ── */
    body.focus-mode .tp-topbar  { box-shadow: none; }
    body.focus-mode .tp-strip   { display: none; }
    body.focus-mode .tp-sidebar { display: none; }
    body.focus-mode .tp-block   { box-shadow: none; backdrop-filter: none; -webkit-backdrop-filter: none; }
    body.focus-mode .tp-content { background-image: none; }

    /* ── Responsivo ── */
    @media (max-width: 960px) {
      .tp-workspace { flex-direction: column; }
      .tp-sidebar {
        width: 100%; position: static; max-height: none;
        border-right: none; border-bottom: 1px solid var(--border);
        padding: var(--s2) var(--s3);
        display: flex; gap: var(--s3); flex-wrap: wrap; align-items: flex-start;
      }
      .tp-sb-divider { display: none; }
      .tp-sb-tutor { margin-bottom: 0; }
      .tp-cycle-widget { margin-bottom: 0; }
    }
    @media (max-width: 680px) {
      .tp-topbar-center { display: none; }
      .tp-content { padding: var(--s2) var(--s2) 90px; }
      .tp-form-row, .tp-form-row-3 { grid-template-columns: 1fr; }
      .tp-status-card { flex-direction: column; }
      .tp-btn-primary span { display: none; }
      .tp-sidebar { flex-direction: column; gap: var(--s2); }
      /* background-attachment: fixed causa bug de blur no iOS Safari */
      body { background-attachment: scroll; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }

    /* ─────────────────────────────────────────────
       Tutor Dashboard V2 — workspace mais humano
    ───────────────────────────────────────────── */

    body.tutor-panel {
      background:
        radial-gradient(circle at 18% 10%, rgba(255,168,0,.14), transparent 24%),
        radial-gradient(circle at 86% 18%, rgba(20,17,98,.08), transparent 26%),
        linear-gradient(135deg, #fffdf8 0%, #fbf5ec 44%, #f3f1ff 100%);
    }

    .tp-workspace {
      max-width: 1360px;
    }

    .tp-content {
      padding: 32px clamp(18px, 3vw, 44px) 110px;
    }

    .tp-dashboard {
      display: grid;
      gap: 18px;
    }

    .tp-hero-v2 {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) 340px;
      gap: 24px;
      min-height: 250px;
      padding: 32px;
      border-radius: 30px;
      border: 1px solid rgba(20,17,98,.12);
      background:
        radial-gradient(circle at 82% 14%, rgba(255,168,0,.22), transparent 30%),
        radial-gradient(circle at 18% 78%, rgba(84,0,66,.08), transparent 26%),
        linear-gradient(135deg, rgba(255,255,255,.94), rgba(255,250,240,.86));
      box-shadow:
        0 24px 70px rgba(35,2,32,.10),
        inset 0 1px 0 rgba(255,255,255,.72);
    }

    .tp-hero-v2::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 24px;
      border: 1px solid rgba(20,17,98,.055);
      pointer-events: none;
    }

    .tp-hero-main,
    .tp-hero-side {
      position: relative;
      z-index: 1;
    }

    .tp-hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--brand);
    }

    .tp-hero-kicker::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(255,168,0,.14);
    }

    .tp-hero-title {
      max-width: 14ch;
      font-family: var(--display);
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: .95;
      color: var(--brand-deep);
      letter-spacing: -.02em;
    }

    .tp-hero-desc {
      max-width: 62ch;
      margin-top: 14px;
      color: var(--ink-soft);
      font-size: .98rem;
    }

    .tp-hero-facts {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .tp-hero-pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      background: rgba(20,17,98,.055);
      border: 1px solid rgba(20,17,98,.08);
      color: var(--brand);
      font-size: .8rem;
      font-weight: 700;
    }

    .tp-hero-side {
      align-self: stretch;
      display: grid;
      gap: 12px;
    }

    .tp-action-v2 {
      display: grid;
      gap: 12px;
      padding: 20px;
      border-radius: 24px;
      background: var(--brand);
      color: #fff;
      box-shadow: 0 18px 44px rgba(20,17,98,.22);
    }

    .tp-action-v2 small {
      color: rgba(255,255,255,.66);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: .68rem;
    }

    .tp-action-v2 strong {
      font-family: var(--display);
      font-size: 1.35rem;
      line-height: 1.05;
    }

    .tp-action-v2 p {
      color: rgba(255,255,255,.78);
      font-size: .88rem;
      line-height: 1.5;
    }

    .tp-action-v2 button {
      margin-top: 4px;
      width: 100%;
      justify-content: center;
    }

    .tp-metrics-v2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tp-metric-v2 {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(20,17,98,.09);
    }

    .tp-metric-v2 b {
      display: block;
      font-family: var(--display);
      font-size: 1.4rem;
      color: var(--brand);
      line-height: 1;
      font-feature-settings: "tnum";
    }

    .tp-metric-v2 span {
      display: block;
      margin-top: 5px;
      font-size: .73rem;
      color: var(--ink-soft);
      font-weight: 700;
    }

    .tp-grid-v2 {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .tp-stack-v2 {
      display: grid;
      gap: 18px;
    }

    .tp-card-v2 {
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(20,17,98,.105);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 16px 44px rgba(35,2,32,.07);
    }

    .tp-card-head-v2 {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .tp-card-kicker-v2 {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .11em;
      color: var(--ink-soft);
    }

    .tp-card-title-v2 {
      margin-top: 4px;
      font-family: var(--display);
      font-size: 1.28rem;
      line-height: 1.05;
      color: var(--ink);
    }

    .tp-card-v2 .tp-plan-entry {
      padding: 14px 0;
    }

    .tp-card-v2 .tp-plan-key {
      color: var(--brand);
    }

    .tp-session-form {
      border-radius: 8px;
    }

    .tp-session-form > summary {
      min-height: 58px;
      padding: 0 20px;
      border-radius: 8px;
      background: rgba(20,17,98,.045);
    }

    .tp-session-form[open] > summary {
      border-radius: 8px 8px 0 0;
    }

    .tp-form-body {
      border-radius: 0 0 8px 8px;
    }

    .tp-session-list {
      gap: 18px;
    }

    .tp-session-item {
      padding: 14px 14px 14px 22px;
      border-radius: 8px;
      background: rgba(20,17,98,.035);
    }

    .tp-session-item::after {
      display: none;
    }

    .tp-empty {
      padding: 14px;
      border-radius: 12px;
      background: rgba(20,17,98,.035);
    }

    .tp-child-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 20px;
      align-items: stretch;
      min-height: 190px;
      padding: 24px;
      border: 1px solid rgba(20,17,98,.12);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,255,255,.95), rgba(255,250,242,.9));
      box-shadow: 0 16px 44px rgba(35,2,32,.07);
    }

    .tp-child-header-main {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .tp-child-title {
      font-family: var(--display);
      font-size: 2.35rem;
      line-height: 1;
      color: var(--brand-deep);
    }

    .tp-child-meta,
    .tp-child-goal,
    .tp-card-copy {
      color: var(--ink-soft);
      font-size: .92rem;
      line-height: 1.55;
    }

    .tp-child-goal {
      max-width: 70ch;
      color: var(--ink);
    }

    .tp-header-actions,
    .tp-inline-actions,
    .tp-session-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tp-cycle-card-v2 {
      display: grid;
      align-content: center;
      gap: 12px;
      padding: 18px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
    }

    .tp-cycle-card-v2 strong {
      font-family: var(--display);
      font-size: 1.55rem;
      line-height: 1;
    }

    .tp-cycle-card-v2 p {
      color: rgba(255,255,255,.78);
      font-size: .86rem;
      line-height: 1.45;
    }

    .tp-status-grid-v2 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .tp-status-grid-v2 .tp-metric-v2 {
      border-radius: 8px;
      background: rgba(255,255,255,.88);
      min-height: 104px;
    }

    .tp-metric-v2 span {
      margin: 0 0 8px;
    }

    .tp-metric-v2 small {
      display: block;
      margin-top: 7px;
      color: var(--ink-soft);
      font-size: .74rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .tp-status-pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: .7rem;
      font-weight: 700;

    .tp-status-pill--ok {
      background: rgba(255,255,255,.16);
      color: #fff;
    }

    .tp-status-pill--warn {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .tp-activity-title {
      margin-bottom: 12px;
      font-family: var(--display);
      font-size: 1.2rem;
      line-height: 1.1;
      color: var(--brand-deep);
    }

    .tp-activity-facts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tp-activity-facts span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(20,17,98,.055);
      color: var(--brand);
      font-size: .76rem;
      font-weight: 700;
    }

    .tp-activity-steps,
    .tp-mini-list {
      display: grid;
      gap: 8px;
      padding-left: 20px;
      color: var(--ink-soft);
      font-size: .88rem;
      line-height: 1.45;
    }

    .tp-activity-variants {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .tp-activity-variants > div,
    .tp-family-preview,
    .tp-report-draft {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(20,17,98,.09);
      background: rgba(20,17,98,.035);
    }

    .tp-activity-variants strong,
    .tp-family-preview strong {
      display: block;
      color: var(--ink);
      font-size: .86rem;
      margin-bottom: 4px;
    }

    .tp-activity-variants p,
    .tp-family-preview p {
      color: var(--ink-soft);
      font-size: .84rem;
      line-height: 1.45;
    }

    .tp-family-preview {
      display: grid;
      gap: 6px;
      background: #fffdf8;
    }

    .tp-family-preview-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--brand);
    }

    .tp-session-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 4px 0 6px;
    }

    .tp-session-meta span {
      border-radius: 999px;
      background: rgba(20,17,98,.055);
      color: var(--brand);
      font-size: .7rem;
      font-weight: 700;
      padding: 3px 8px;
    }

    .tp-report-draft {
      margin-top: 16px;
    }

    .tp-report-draft summary {
      cursor: pointer;
      color: var(--brand);
      font-weight: 700;
      font-size: .86rem;
    }

    .tp-report-draft textarea {
      width: 100%;
      min-height: 110px;
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      resize: vertical;

    .tp-team-card .tp-inline-actions {
      margin-top: 4px;
    }

    @media (max-width: 1050px) {
      .tp-hero-v2,
      .tp-grid-v2,
      .tp-child-header {
        grid-template-columns: 1fr;
      }

      .tp-hero-title {
        max-width: 18ch;
      }

    @media (max-width: 680px) {
      .tp-content {
        padding: 16px 14px 96px;
      }

      .tp-hero-v2,
      .tp-card-v2 {
        border-radius: 8px;
        padding: 20px;
      }

      .tp-metrics-v2 {
        grid-template-columns: 1fr;
      }

      .tp-status-grid-v2,
      .tp-activity-variants {
        grid-template-columns: 1fr;
      }

      .tp-child-title {
        font-size: 1.85rem;
      }
    }
  </style>

<body class="tutor-panel">

  <header class="tp-topbar" role="banner">
    <div class="tp-topbar-inner">
      <a class="tp-brand" href="../index.html" aria-label="Cognita Hub — início">
        <div class="tp-brand-mark">
          <img src="../assets/logo-icon-transparent.png" alt="" />
        </div>
        <div class="tp-brand-copy">
          <strong>Cognita Hub</strong>
          <small>Tutor voluntário</small>
        </div>
      </a>

      <div class="tp-topbar-center">
        <p class="tp-greeting" data-tutor-title>Carregando...</p>
      </div>

      <div class="tp-topbar-actions">
        <button class="tp-btn-primary" type="button" data-open-session hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          <span>Registrar sessão</span>
        </button>
        <button class="tp-icon-btn" type="button" data-focus-toggle aria-pressed="false" aria-label="Modo Foco">
          <i class="tp-focus-dot" aria-hidden="true"></i>
          <span class="sr-only" data-focus-label>Modo Foco</span>
        </button>
        <div class="tp-avatar" data-account-avatar aria-hidden="true">T</div>
        <button class="tp-icon-btn" type="button" data-logout aria-label="Sair da conta">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div data-tp-strip class="tp-strip" aria-live="polite" aria-atomic="true"></div>

  <div class="tp-workspace">
    <aside class="tp-sidebar" data-tutor-sidebar aria-label="Contexto do tutor">
      <div class="tp-skeleton tp-sb-skeleton-avatar"></div>
      <div class="tp-skeleton tp-sb-skeleton-line" style="margin-top:12px;width:80%"></div>
      <div class="tp-skeleton tp-sb-skeleton-line-sm"></div>
    </aside>

    <main class="tp-content" id="main-content">
      <div data-tutor-state aria-live="polite">
        <div class="tp-skeleton tp-skeleton--hero"></div>
        <div class="tp-skeleton tp-skeleton--panel"></div>
      </div>
    </main>
  </div>

  <div hidden>
    <span data-tutor-name></span>
    <span data-account-name></span>
    <span data-account-email></span>
  </div>

  <script type="module" src="../js/pages/tutor.js"></script>
</body>
</html>
