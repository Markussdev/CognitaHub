<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel do Tutor | Cognita Hub</title>
  <link rel="icon" type="image/png" href="../assets/logo-icon-transparent.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       PAINEL DO TUTOR — "Record" do Cognita App OS
       Cognita por fora acolhe (mascote, curvas); por dentro guia:
       limpo, rápido, organizado. Densidade SaaS, laranja só na
       ação de registrar sessão, Atkinson, mascote só em vazios reais.
       ============================================================ */
    :root {
      --ink: #230220; --ink-soft: #5b4a58; --muted: #8a8391;
      --canvas: #f8f7f6; --card: #ffffff; --rail: #fcfbfa;
      --brand: #141162; --brand-deep: #540042; --accent: #ffa800;
      --ok: #1c7c54; --ok-soft: #e8f2ed;
      --warn: #b3590a; --warn-soft: #fbf0e6;
      --bad: #a3123a; --bad-soft: rgba(163,18,58,.08);
      --line: rgba(20,17,98,.09); --line-2: rgba(20,17,98,.14);
      --shadow: 0 1px 2px rgba(35,2,32,.05);
      --r: 10px; --r-sm: 7px; --pill: 999px;
      --font: "Atkinson Hyperlegible", system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); color: var(--ink); background: var(--canvas); font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    svg { fill: none; stroke: currentColor; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
    :focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 4px; }
    .num { font-variant-numeric: tabular-nums; }
    a { color: inherit; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
    [hidden] { display: none !important; }

    /* ── App shell ── */
    .app { display: grid; grid-template-columns: 212px 1fr; min-height: 100vh; }

    .rail { background: var(--rail); border-right: 1px solid var(--line); display: flex; flex-direction: column; padding: 14px 12px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .rail-brand { display: flex; align-items: center; gap: 9px; padding: 4px 6px 14px; text-decoration: none; }
    .rail-mark { width: 28px; height: 28px; border-radius: 8px; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: .82rem; flex-shrink: 0; overflow: hidden; }
    .rail-mark img { width: 70%; height: 70%; object-fit: contain; }
    .rail-brand b { font-size: .9rem; letter-spacing: -.01em; color: var(--ink); }
    .rail-brand small { display: block; font-size: .66rem; color: var(--muted); font-weight: 700; }
    .rail-group { font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); padding: 14px 8px 6px; }
    .rail-link { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--r-sm); color: var(--ink-soft); text-decoration: none; font-size: .86rem; font-weight: 700; }
    .rail-link svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
    .rail-link:hover { background: rgba(20,17,98,.045); }
    .rail-link.active { background: rgba(20,17,98,.075); color: var(--brand); }
    .rail-link.active svg { color: var(--brand); }
    .rail-spacer { flex: 1; }
    .rail-account { display: flex; align-items: center; gap: 9px; padding: 8px; border-top: 1px solid var(--line); margin-top: 8px; }
    .rail-account .av { width: 28px; height: 28px; border-radius: 50%; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: .72rem; flex-shrink: 0; }
    .rail-account .nm { font-size: .8rem; font-weight: 700; line-height: 1.15; }
    .rail-account .rl { font-size: .68rem; color: var(--muted); }
    .rail-account button { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; display: grid; place-items: center; padding: 4px; border-radius: 6px; }
    .rail-account button:hover { background: rgba(20,17,98,.06); color: var(--brand); }
    .rail-account button svg { width: 16px; height: 16px; }

    /* ── Shell / topbar ── */
    .shell { display: flex; flex-direction: column; min-width: 0; }
    .topbar { display: flex; align-items: center; gap: 16px; height: 52px; padding: 0 22px; border-bottom: 1px solid var(--line); background: rgba(248,247,246,.85); backdrop-filter: blur(6px); position: sticky; top: 0; z-index: 10; }
    .crumb { font-size: .82rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .crumb b { color: var(--ink); font-weight: 700; }
    .search { flex: 1; max-width: 420px; display: flex; align-items: center; gap: 8px; height: 34px; padding: 0 11px; border: 1px solid var(--line-2); border-radius: var(--r-sm); background: var(--card); color: var(--muted); font-size: .84rem; }
    .search svg { width: 15px; height: 15px; flex-shrink: 0; }
    .search .kbd { margin-left: auto; font-size: .72rem; font-weight: 700; color: var(--muted); border: 1px solid var(--line-2); border-radius: 5px; padding: 1px 6px; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .icon-btn { display: grid; place-items: center; width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--line-2); background: var(--card); color: var(--ink-soft); cursor: pointer; }
    .icon-btn svg { width: 15px; height: 15px; }
    .icon-btn:hover { border-color: var(--brand); color: var(--brand); }
    .focus-dot { position: relative; width: 20px; height: 12px; border-radius: var(--pill); background: rgba(20,17,98,.16); }
    .focus-dot::after { content: ""; position: absolute; top: 2px; left: 2px; width: 8px; height: 8px; border-radius: 50%; background: var(--ink-soft); transition: transform .2s, background .2s; }
    [aria-pressed="true"] .focus-dot { background: rgba(255,168,0,.22); }
    [aria-pressed="true"] .focus-dot::after { transform: translateX(8px); background: var(--accent); }
    .topbar-right .av { width: 30px; height: 30px; border-radius: 50%; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: .74rem; flex-shrink: 0; }

    /* ── Cabeçalho do record ── */
    .record { padding: 22px 26px 0; }
    .rec-top { display: flex; align-items: flex-start; gap: 18px; }
    .rec-id { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(150deg, #1a1670, #540042); color: #fff; display: grid; place-items: center; font-size: 1.4rem; font-weight: 700; flex-shrink: 0; }
    .rec-main { min-width: 0; flex: 1; }
    .rec-name { font-size: 1.7rem; font-weight: 700; color: var(--brand-deep); line-height: 1; letter-spacing: -.02em; }
    .rec-meta { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
    .meta-chip { display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 9px; border: 1px solid var(--line-2); border-radius: var(--pill); font-size: .76rem; font-weight: 700; color: var(--ink-soft); background: var(--card); }
    .meta-chip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .meta-chip .dot.ok { background: var(--ok); }
    .meta-chip .dot.warn { background: var(--warn); }
    .meta-chip .dot.info { background: var(--brand); }
    .rec-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn { display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 15px; border-radius: var(--r-sm); font-family: var(--font); font-size: .84rem; font-weight: 700; cursor: pointer; white-space: nowrap; text-decoration: none; border: none; }
    .btn svg { width: 15px; height: 15px; }
    .btn-accent { background: var(--accent); color: var(--ink); box-shadow: 0 1px 6px rgba(255,168,0,.3); }
    .btn-accent:hover:not(:disabled) { filter: brightness(.97); }
    .btn-accent:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
    .btn-ghost { background: var(--card); color: var(--brand); border: 1px solid var(--line-2); }
    .btn-ghost:hover:not(:disabled) { background: rgba(20,17,98,.04); }
    .btn-ghost:disabled { opacity: .45; cursor: not-allowed; }
    .btn-sm { height: 32px; padding: 0 12px; font-size: .8rem; }

    /* ── Abas ── */
    .tabs { display: flex; gap: 2px; margin-top: 20px; border-bottom: 1px solid var(--line); padding: 0 26px; position: sticky; top: 52px; background: var(--canvas); z-index: 9; overflow-x: auto; }
    .tab { appearance: none; background: none; border: none; font-family: var(--font); font-size: .88rem; font-weight: 700; color: var(--muted); padding: 11px 13px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
    .tab:hover { color: var(--ink-soft); }
    .tab.active { color: var(--brand); border-bottom-color: var(--brand); }
    .tab .badge { display: inline-block; margin-left: 6px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: var(--pill); background: rgba(20,17,98,.08); color: var(--brand); font-size: .68rem; line-height: 18px; text-align: center; }

    /* ── Painel ── */
    .panel { padding: 22px 26px 60px; }
    .panel[hidden] { display: none; }
    .cols { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(0, 360px); gap: 22px; align-items: start; }

    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r); box-shadow: var(--shadow); }
    .card-h { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 13px 16px; border-bottom: 1px solid var(--line); }
    .card-h h3 { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-soft); }
    .card-h-link { font-size: .78rem; font-weight: 700; text-decoration: none; color: var(--muted); }
    .card-h-link:hover { color: var(--brand); }
    .card-b { padding: 6px 16px 14px; }
    .stack { display: grid; gap: 16px; }

    .kv { display: grid; grid-template-columns: 150px 1fr; gap: 0; }
    .kv > dt { padding: 11px 0; font-size: .82rem; color: var(--muted); font-weight: 700; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
    .kv > dt:first-of-type, .kv > dt:first-of-type + dd { border-top: none; }
    .kv > dt svg { width: 14px; height: 14px; color: var(--muted); flex-shrink: 0; }
    .kv > dd { padding: 11px 0; font-size: .9rem; color: var(--ink); border-top: 1px solid var(--line); line-height: 1.45; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { display: inline-flex; align-items: center; height: 24px; padding: 0 9px; border-radius: var(--pill); background: rgba(20,17,98,.05); color: var(--brand); font-size: .76rem; font-weight: 700; }

    /* Banner próxima ação */
    .nextbar { display: flex; align-items: center; gap: 14px; padding: 13px 16px; border: 1px solid var(--line); border-left: 3px solid var(--brand); border-radius: var(--r); background: var(--card); box-shadow: var(--shadow); }
    .nextbar.tone-warn { border-left-color: var(--warn); }
    .nextbar.tone-ok { border-left-color: var(--ok); }
    .nextbar .ico { width: 34px; height: 34px; border-radius: 9px; background: rgba(20,17,98,.07); color: var(--brand); display: grid; place-items: center; flex-shrink: 0; }
    .nextbar.tone-warn .ico { background: var(--warn-soft); color: var(--warn); }
    .nextbar.tone-ok .ico { background: var(--ok-soft); color: var(--ok); }
    .nextbar .ico svg { width: 17px; height: 17px; }
    .nextbar .tx { flex: 1; min-width: 0; }
    .nextbar .lb { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--warn); }
    .nextbar.tone-ok .lb { color: var(--ok); }
    .nextbar.tone-default .lb { color: var(--brand); }
    .nextbar .ti { font-size: .92rem; font-weight: 700; }
    .nextbar .ds { font-size: .8rem; color: var(--muted); }

    /* Atividade sugerida */
    .sg-title { font-size: .98rem; font-weight: 700; }
    .sg-why { font-size: .82rem; color: var(--ink-soft); margin-top: 4px; line-height: 1.45; }
    .sg-facts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .sg-facts span { font-size: .74rem; font-weight: 700; color: var(--muted); border: 1px solid var(--line-2); border-radius: var(--pill); padding: 2px 8px; }

    /* Feed de atividade */
    .feed { display: grid; }
    .feed-item { display: flex; gap: 11px; padding: 11px 0; border-top: 1px solid var(--line); }
    .feed-item:first-child { border-top: none; }
    .feed-ico { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; }
    .feed-ico svg { width: 14px; height: 14px; }
    .feed-ico.you { background: var(--ok-soft); color: var(--ok); }
    .feed-ico.team { background: rgba(20,17,98,.07); color: var(--brand); }
    .feed-tx { font-size: .85rem; line-height: 1.4; min-width: 0; }
    .feed-tx b { font-weight: 700; }
    .feed-tx .sub { color: var(--muted); display: block; }
    .feed-time { font-size: .74rem; color: var(--muted); margin-left: auto; white-space: nowrap; flex-shrink: 0; }

    /* Tabela leve (Sessões) */
    .tbl { width: 100%; border-collapse: collapse; font-size: .86rem; }
    .tbl th { text-align: left; font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; padding: 9px 12px; border-bottom: 1px solid var(--line); }
    .tbl td { padding: 12px; border-bottom: 1px solid var(--line); color: var(--ink); vertical-align: top; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: rgba(20,17,98,.022); }
    .pill { display: inline-flex; align-items: center; height: 21px; padding: 0 8px; border-radius: var(--pill); font-size: .7rem; font-weight: 700; }
    .pill-ok { background: var(--ok-soft); color: var(--ok); }
    .pill-mid { background: var(--warn-soft); color: var(--warn); }
    .pill-bad { background: var(--bad-soft); color: var(--bad); }
    .tbl-bar { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 1px solid var(--line); }

    /* ── Form de sessão ── */
    .form > summary { display: flex; align-items: center; justify-content: space-between; height: 46px; padding: 0 16px; cursor: pointer; list-style: none; font-size: .86rem; font-weight: 700; }
    .form > summary::-webkit-details-marker { display: none; }
    .form > summary svg { width: 16px; height: 16px; transition: transform .2s; flex-shrink: 0; }
    .form[open] > summary svg { transform: rotate(180deg); }
    .form-body { padding: 0 16px 16px; display: grid; gap: 14px; border-top: 1px solid var(--line); padding-top: 14px; }
    .lvl { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .guide { font-size: .82rem; color: var(--ink-soft); line-height: 1.5; padding: 12px; border-radius: var(--r-sm); background: rgba(20,17,98,.03); border-left: 3px solid var(--brand); }
    .guide strong { color: var(--brand); display: block; margin-bottom: 4px; }
    .guide em { display: block; margin-top: 6px; color: var(--ok); font-style: normal; }

    .row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .row3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: .78rem; font-weight: 700; color: var(--ink-soft); }
    .field input, .field textarea {
      width: 100%; padding: 9px 11px; border: 1px solid var(--line-2); border-radius: var(--r-sm);
      background: var(--canvas); color: var(--ink); font-family: var(--font); font-size: .88rem;
    }
    .field input:focus-visible, .field textarea:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; border-color: var(--brand); }
    .field textarea { min-height: 78px; resize: vertical; line-height: 1.5; }
    .scale { display: flex; flex-wrap: wrap; gap: 6px; }
    .scale-btn {
      display: inline-flex; align-items: center; height: 30px; padding: 0 10px;
      border: 1px solid var(--line-2); border-radius: var(--pill);
      background: var(--canvas); color: var(--ink-soft);
      font-family: var(--font); font-size: .76rem; font-weight: 700; cursor: pointer;
    }
    .scale-btn:hover { border-color: var(--brand); color: var(--brand); }
    .scale-btn.selected { border-color: var(--brand); background: rgba(20,17,98,.08); color: var(--brand); }
    .scale-btn--ok.selected { border-color: var(--ok); background: var(--ok-soft); color: var(--ok); }
    .scale-btn--warn.selected { border-color: var(--warn); background: var(--warn-soft); color: var(--warn); }
    .scale-btn--bad.selected { border-color: var(--bad); background: var(--bad-soft); color: var(--bad); }

    .family-preview { display: grid; gap: 5px; padding: 12px; border-radius: var(--r-sm); border: 1px solid var(--line); background: #fffdf8; }
    .family-preview-label { font-size: .66rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--brand); }
    .family-preview p { font-size: .84rem; color: var(--ink-soft); line-height: 1.45; }
    .char-count { font-size: .72rem; color: var(--muted); text-align: right; }

    .checklist { list-style: none; display: grid; gap: 7px; }
    .checklist li { display: flex; align-items: flex-start; gap: 9px; }
    .checklist input[type="checkbox"] { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; accent-color: var(--brand); cursor: pointer; }
    .checklist label { font-size: .84rem; color: var(--ink-soft); cursor: pointer; line-height: 1.4; }

    .internal-note { border: 1px solid var(--line); border-radius: var(--r-sm); overflow: hidden; }
    .internal-note-label { display: flex; align-items: center; gap: 7px; padding: 7px 11px; background: rgba(20,17,98,.04); border-bottom: 1px solid var(--line); font-size: .71rem; font-weight: 700; color: var(--muted); }
    .internal-note-label svg { width: 12px; height: 12px; flex-shrink: 0; }
    .internal-note textarea { display: block; width: 100%; padding: 11px; border: none; background: var(--card); color: var(--ink); font-family: var(--font); font-size: .86rem; min-height: 64px; resize: vertical; line-height: 1.5; }
    .internal-note textarea:focus-visible { outline: 2px solid var(--brand); outline-offset: -2px; }

    .form-actions { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; }
    .form-ok { font-size: .86rem; color: var(--ok); font-weight: 700; }
    .form-error { font-size: .86rem; color: var(--bad); font-weight: 700; }
    .locked-note { display: flex; align-items: flex-start; gap: 10px; padding: 13px 16px; font-size: .85rem; color: var(--ink-soft); line-height: 1.5; }
    .locked-note svg { width: 17px; height: 17px; color: var(--muted); flex-shrink: 0; margin-top: 1px; }

    /* Plano */
    .steps { display: grid; gap: 8px; }
    .step { display: flex; gap: 11px; align-items: flex-start; padding: 12px; border: 1px solid var(--line); border-radius: var(--r-sm); }
    .step.done { background: var(--ok-soft); border-color: transparent; }
    .step.now  { border-color: var(--brand); }
    .step-n { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; font-size: .76rem; font-weight: 700; flex-shrink: 0; border: 1.5px solid var(--line-2); color: var(--muted); }
    .step.done .step-n { background: var(--ok); border-color: var(--ok); color: #fff; }
    .step.now .step-n  { background: var(--brand); border-color: var(--brand); color: #fff; }
    .step b { font-size: .88rem; }
    .step p { font-size: .82rem; color: var(--ink-soft); margin-top: 2px; }

    .muted { color: var(--muted); }
    .card-copy { font-size: .87rem; color: var(--ink-soft); line-height: 1.5; }
    .mini { display: grid; gap: 6px; padding-left: 16px; font-size: .85rem; color: var(--ink-soft); line-height: 1.45; }

    /* Vazio com mascote — só em vazios genuínos */
    .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; padding: 28px 16px; }
    .empty-state img { width: 56px; height: 56px; object-fit: contain; filter: drop-shadow(0 6px 10px rgba(20,17,98,.18)); }
    .empty-state strong { font-size: .9rem; color: var(--ink); }
    .empty-state span { font-size: .82rem; color: var(--muted); max-width: 36ch; line-height: 1.5; }

    /* Status sem record (candidatura/aguardando pareamento) */
    .status-card { display: flex; gap: 16px; align-items: flex-start; padding: 24px; }
    .status-ico { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; flex-shrink: 0; }
    .status-ico svg { width: 22px; height: 22px; }
    .status-ico.pending { background: var(--warn-soft); color: var(--warn); }
    .status-ico.ok { background: var(--ok-soft); color: var(--ok); }
    .status-ico.info { background: rgba(20,17,98,.07); color: var(--brand); }
    .status-kicker { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .status-title { font-size: 1.25rem; font-weight: 700; color: var(--brand-deep); margin: 5px 0 9px; line-height: 1.15; }
    .status-card > div > p { font-size: .88rem; color: var(--ink-soft); line-height: 1.6; max-width: 56ch; }
    .lib-link { display: inline-block; margin-top: 12px; color: var(--brand); font-weight: 700; font-size: .88rem; text-decoration: none; }
    .lib-link:hover { text-decoration: underline; }

    /* Erro / retry */
    .error-card { text-align: center; padding: 30px 20px; }
    .error-card strong { display: block; font-size: 1rem; color: var(--bad); margin-bottom: 6px; }
    .error-card p { font-size: .88rem; color: var(--ink-soft); margin-bottom: 16px; }

    /* Skeleton */
    .skel { border-radius: var(--r); background: linear-gradient(100deg, #ece9e6 40%, #f4f2f0 50%, #ece9e6 60%); background-size: 200% 100%; animation: shimmer 1.4s ease infinite; }
    @keyframes shimmer { 0% { background-position: 100% 50%; } 100% { background-position: -100% 50%; } }
    .skel-rec { height: 110px; margin: 22px 26px 0; }
    .skel-panel { height: 220px; margin: 18px 26px; }

    /* ── Modo Foco ── */
    body.focus-mode .search,
    body.focus-mode .feed-card,
    body.focus-mode .suggestion-card,
    body.focus-mode .rail-group,
    body.focus-mode .rail-link:not(.active) { display: none; }
    body.focus-mode .card { box-shadow: none; }

    @media (max-width: 940px) {
      .app { grid-template-columns: 1fr; }
      .rail { position: fixed; left: -260px; z-index: 50; }
      .cols { grid-template-columns: 1fr; }
      .rec-top { flex-direction: column; }
      .tabs { overflow-x: auto; }
      .row, .row3 { grid-template-columns: 1fr; }
      .record, .panel { padding-left: 16px; padding-right: 16px; }
      .skel-rec, .skel-panel { margin-left: 16px; margin-right: 16px; }
    }
  </style>
</head>
