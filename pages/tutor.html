<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel do Tutor | Cognita Hub</title>
  <link rel="icon" type="image/png" href="../assets/logo-icon-transparent.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Baloo+2:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #26051F; --ink-soft: #625363;
      --paper: #FCF7F1; --surface: #FFFFFF;
      --brand: #141162; --brand-deep: #540042; --accent: #FFA800;
      --ok: #1C7C54; --warn: #B3590A; --bad: #A3123A;
      --ok-soft: rgba(28,124,84,.10); --warn-soft: rgba(179,89,10,.10); --bad-soft: rgba(163,18,58,.08);
      --border: rgba(20,17,98,.11); --border-strong: rgba(20,17,98,.22);
      --shadow-soft: 0 2px 12px rgba(35,2,32,.06);
      --shadow-card: 0 8px 28px rgba(35,2,32,.08);
      --r-sm: 10px; --r: 16px; --r-lg: 22px; --r-xl: 30px; --r-pill: 999px;
      --s1: 8px; --s2: 16px; --s3: 24px; --s4: 32px;
      --font: "Atkinson Hyperlegible", system-ui, -apple-system, "Segoe UI", sans-serif;
      --display: "Baloo 2", var(--font);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font); color: var(--ink);
      background: var(--paper); font-size: 16px;
      line-height: 1.55; -webkit-font-smoothing: antialiased; min-height: 100vh;
    }
    :focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 6px; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }

    /* ---- Topbar ---- */
    .tp-topbar {
      position: sticky; top: 0; z-index: 40;
      background: rgba(252,247,241,.92); backdrop-filter: blur(12px) saturate(1.1);
      border-bottom: 1px solid var(--border);
    }
    .tp-topbar-inner {
      display: flex; align-items: center; gap: var(--s2);
      height: 64px; max-width: 1200px; margin: 0 auto; padding: 0 var(--s3);
    }
    .tp-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); flex-shrink: 0; }
    .tp-brand-mark {
      width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center;
      background: var(--brand); overflow: hidden; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(20,17,98,.22);
    }
    .tp-brand-mark img { width: 76%; height: 76%; object-fit: contain; }
    .tp-brand-copy strong { display: block; font-family: var(--display); font-size: .95rem; color: var(--ink); }
    .tp-brand-copy small { display: block; font-size: .72rem; color: var(--ink-soft); font-weight: 700; }
    .tp-topbar-center { flex: 1; min-width: 0; padding: 0 var(--s2); }
    .tp-greeting { font-size: .93rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink-soft); }
    .tp-topbar-actions { display: flex; align-items: center; gap: var(--s1); flex-shrink: 0; }

    /* Buttons */
    .tp-btn-primary {
      display: inline-flex; align-items: center; gap: 7px;
      min-height: 38px; padding: 0 var(--s2); border: none; border-radius: var(--r-pill);
      background: var(--accent); color: var(--ink);
      font-family: var(--font); font-size: .86rem; font-weight: 700; cursor: pointer; white-space: nowrap;
      box-shadow: 0 4px 14px rgba(255,168,0,.28);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .tp-btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(255,168,0,.4); }
    .tp-btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    [hidden] { display: none !important; }
    .tp-btn-primary svg { width: 16px; height: 16px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .tp-icon-btn {
      display: grid; place-items: center; width: 38px; height: 38px; flex-shrink: 0;
      border: 1px solid var(--border); border-radius: var(--r-pill);
      background: var(--surface); color: var(--ink-soft); cursor: pointer;
      transition: border-color .15s ease;
    }
    .tp-icon-btn:hover { border-color: var(--border-strong); }
    .tp-icon-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tp-avatar {
      display: grid; place-items: center; width: 38px; height: 38px; flex-shrink: 0;
      border-radius: var(--r-pill); background: var(--brand); color: #fff;
      font-weight: 700; font-size: .86rem;
    }
    .tp-focus-dot {
      position: relative; width: 22px; height: 13px; border-radius: var(--r-pill);
      background: rgba(20,17,98,.16); transition: background .2s ease;
    }
    .tp-focus-dot::after {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--ink-soft); transition: transform .2s ease, background .2s ease;
    }
    [aria-pressed="true"] .tp-focus-dot { background: rgba(255,168,0,.2); }
    [aria-pressed="true"] .tp-focus-dot::after { transform: translateX(9px); background: var(--accent); }

    /* ---- Status strip ---- */
    .tp-strip {
      display: flex; align-items: center; gap: var(--s2);
      padding: 9px var(--s3); border-bottom: 1px solid var(--border);
      background: var(--surface); font-size: .84rem; color: var(--ink-soft);
      min-height: 38px;
    }
    .tp-strip-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .tp-strip-dot--pending { background: var(--warn); animation: tp-pulse 2s ease infinite; }
    .tp-strip-dot--ok     { background: var(--ok); }
    .tp-strip-dot--info   { background: var(--brand); }
    .tp-strip-dot--bad    { background: var(--bad); }
    @keyframes tp-pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    .tp-strip strong { color: var(--ink); }

    /* ---- Main ---- */
    .tp-main { max-width: 1200px; margin: 0 auto; padding: var(--s3) var(--s3) 100px; }

    /* ---- Skeleton ---- */
    .tp-skeleton {
      border-radius: var(--r-lg);
      background: linear-gradient(100deg, #ede9e3 40%, #f5f1ec 50%, #ede9e3 60%);
      background-size: 200% 100%; animation: tp-shimmer 1.4s ease infinite;
    }
    @keyframes tp-shimmer { 0% { background-position: 100% 50%; } 100% { background-position: -100% 50%; } }
    .tp-skeleton--hero { height: 196px; }
    .tp-skeleton--panel { height: 130px; margin-top: var(--s2); }

    /* ---- Status card (estados sem ciclo) ---- */
    .tp-status-card {
      display: flex; align-items: flex-start; gap: var(--s3);
      padding: var(--s4); background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-card);
    }
    .tp-status-icon {
      width: 52px; height: 52px; flex-shrink: 0; border-radius: var(--r);
      display: grid; place-items: center;
    }
    .tp-status-icon svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .tp-status-icon--pending { background: var(--warn-soft); color: var(--warn); }
    .tp-status-icon--ok      { background: var(--ok-soft); color: var(--ok); }
    .tp-status-icon--info    { background: rgba(20,17,98,.07); color: var(--brand); }
    .tp-status-icon--bad     { background: var(--bad-soft); color: var(--bad); }
    .tp-status-body { flex: 1; min-width: 0; }
    .tp-status-kicker { font-size: .76rem; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .08em; }
    .tp-status-title { font-family: var(--display); font-size: 1.35rem; font-weight: 700; line-height: 1.15; margin: 5px 0 10px; }
    .tp-status-body > p { color: var(--ink-soft); font-size: .9rem; line-height: 1.6; max-width: 54ch; }
    .tp-lib-link {
      display: inline-block; margin-top: var(--s2);
      color: var(--brand); font-weight: 700; font-size: .9rem; text-decoration: none;
    }
    .tp-lib-link:hover { text-decoration: underline; }

    /* Timeline de etapas (candidatura pendente) */
    .tp-steps { list-style: none; display: flex; flex-direction: column; gap: 0; margin-top: var(--s3); }
    .tp-step { display: flex; align-items: flex-start; gap: var(--s2); padding-bottom: var(--s2); position: relative; }
    .tp-step::before { content: ""; position: absolute; left: 15px; top: 32px; bottom: 0; width: 2px; background: var(--border); }
    .tp-step:last-child::before { display: none; }
    .tp-step-dot {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%; display: grid; place-items: center;
      border: 2px solid var(--border); background: var(--paper); font-size: .78rem; font-weight: 700; color: var(--ink-soft);
    }
    .tp-step-dot--done   { border-color: var(--ok); background: var(--ok-soft); color: var(--ok); }
    .tp-step-dot--active { border-color: var(--accent); background: rgba(255,168,0,.1); color: var(--brand); }
    .tp-step-copy { padding-top: 5px; }
    .tp-step-copy strong { display: block; font-size: .9rem; color: var(--ink); }
    .tp-step-copy span   { font-size: .84rem; color: var(--ink-soft); }

    /* Etapas de orientação inicial */
    .tp-orient-steps { margin-top: var(--s3); display: grid; gap: var(--s2); }
    .tp-orient-step {
      display: flex; align-items: flex-start; gap: var(--s2);
      padding: var(--s2); border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--paper);
    }
    .tp-orient-num {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
      background: rgba(20,17,98,.08); color: var(--brand);
      display: grid; place-items: center; font-size: .82rem; font-weight: 700;
    }
    .tp-orient-copy { flex: 1; min-width: 0; }
    .tp-orient-copy strong { display: block; font-size: .9rem; color: var(--ink); margin-bottom: 2px; }
    .tp-orient-copy span { font-size: .82rem; color: var(--ink-soft); }

    /* ---- Hero card (ciclo ativo) ---- */
    .tp-hero-card {
      display: flex; align-items: flex-start; gap: var(--s3);
      background: var(--brand); color: #fff;
      border-radius: var(--r-xl); padding: var(--s4);
      box-shadow: 0 12px 36px rgba(20,17,98,.22);
      position: relative; overflow: hidden; margin-bottom: var(--s2);
    }
    .tp-hero-card::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(circle at 88% 18%, rgba(255,168,0,.18), transparent 36%),
        radial-gradient(circle at 8% 82%, rgba(255,255,255,.05), transparent 34%);
    }
    .tp-hero-month { position: relative; z-index: 1; flex-shrink: 0; text-align: center; padding-top: 4px; }
    .tp-hero-month-num {
      font-family: var(--display); font-size: 3.6rem; font-weight: 700; line-height: 1; color: var(--accent);
      font-feature-settings: "tnum";
    }
    .tp-hero-month-label { display: block; font-size: .7rem; font-weight: 700; color: rgba(255,255,255,.6); letter-spacing: .06em; text-transform: uppercase; }
    .tp-hero-month-total { display: block; font-size: .78rem; color: rgba(255,255,255,.45); }
    .tp-hero-body { position: relative; z-index: 1; flex: 1; min-width: 0; }
    .tp-hero-kicker { font-size: .72rem; font-weight: 700; color: rgba(255,255,255,.6); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    .tp-hero-name { font-family: var(--display); font-size: 1.65rem; font-weight: 700; color: #fff; line-height: 1.1; margin-bottom: var(--s1); }
    .tp-hero-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: var(--s2); }
    .tp-chip {
      display: inline-flex; align-items: center; gap: 6px; min-height: 24px; padding: 0 9px;
      border-radius: var(--r-pill); font-size: .76rem; font-weight: 700; border: 1px solid transparent;
    }
    .tp-chip i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .tp-chip--ok   { background: rgba(28,124,84,.2); color: #6de09e; border-color: rgba(28,124,84,.3); }
    .tp-chip--warn { background: rgba(255,168,0,.2); color: var(--accent); border-color: rgba(255,168,0,.35); }
    .tp-chip--info { background: rgba(255,255,255,.12); color: rgba(255,255,255,.8); border-color: rgba(255,255,255,.2); }
    .tp-progress-track { display: flex; gap: 4px; margin-bottom: var(--s2); }
    .tp-progress-seg        { flex: 1; height: 5px; border-radius: var(--r-pill); background: rgba(255,255,255,.15); }
    .tp-progress-seg--done  { background: rgba(255,168,0,.6); }
    .tp-progress-seg--active{ background: var(--accent); }
    .tp-hero-link {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 13px; border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.22); background: rgba(255,255,255,.1);
      color: #fff; font-size: .84rem; font-weight: 700; text-decoration: none;
      transition: background .15s ease;
    }
    .tp-hero-link:hover { background: rgba(255,255,255,.2); }

    /* ---- Dashboard grid ---- */
    .tp-dashboard-grid { display: grid; grid-template-columns: minmax(0,1.4fr) minmax(260px,.7fr); gap: var(--s2); align-items: start; }
    .tp-right-column { display: grid; gap: var(--s2); align-content: start; }
    .tp-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-soft); padding: var(--s3); }
    .tp-panel-title { font-size: .74rem; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .07em; margin-bottom: var(--s2); }

    /* ---- Próxima sessão (o que fazer agora) ---- */
    .tp-next-card {
      padding: var(--s3); border-radius: var(--r-lg);
      border: 2px solid var(--accent); background: rgba(255,168,0,.04);
      margin-bottom: var(--s2);
    }
    .tp-next-kicker { font-size: .7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .09em; margin-bottom: 5px; }
    .tp-next-title { font-family: var(--display); font-size: 1.05rem; color: var(--ink); margin-bottom: var(--s2); line-height: 1.25; }
    .tp-next-info { display: grid; gap: 6px; margin-bottom: var(--s2); }
    .tp-next-row { display: flex; align-items: baseline; gap: 8px; font-size: .88rem; }
    .tp-next-row strong { color: var(--ink-soft); font-weight: 700; flex-shrink: 0; }
    .tp-next-row span { color: var(--ink); }
    .tp-next-empty { font-size: .86rem; color: var(--ink-soft); line-height: 1.55; margin-bottom: var(--s2); }
    .tp-btn-register {
      display: inline-flex; align-items: center; gap: 7px;
      min-height: 42px; padding: 0 var(--s3); border: none; border-radius: var(--r-pill);
      background: var(--accent); color: var(--ink);
      font-family: var(--font); font-size: .9rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(255,168,0,.28);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .tp-btn-register:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(255,168,0,.4); }
    .tp-btn-register svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* ---- Sessões (timeline) ---- */
    .tp-session-list { display: grid; gap: var(--s3); }
    .tp-session-item { position: relative; padding-left: 24px; }
    .tp-session-item::before { content: ""; position: absolute; left: 3px; top: 7px; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
    .tp-session-item::after { content: ""; position: absolute; left: 7px; top: 19px; bottom: calc(-1 * var(--s3)); width: 2px; background: var(--border); }
    .tp-session-list .tp-session-item:last-child::after { display: none; }
    .tp-session-date  { font-size: .73rem; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em; }
    .tp-session-title { font-size: .94rem; font-weight: 700; color: var(--ink); margin: 2px 0 3px; }
    .tp-session-field { font-size: .86rem; color: var(--ink-soft); margin: 2px 0; }
    .tp-session-field strong { color: var(--ink); }
    .tp-session-note { font-size: .84rem; color: var(--ink-soft); margin: 3px 0; line-height: 1.45; }
    .tp-session-tag {
      display: inline-flex; align-items: center; min-height: 20px; padding: 0 7px;
      border-radius: var(--r-pill); font-size: .7rem; font-weight: 700; margin-top: 5px;
    }
    .tp-session-tag--reg { background: rgba(20,17,98,.07); color: var(--brand); }
    .tp-session-tag--vis { background: var(--ok-soft); color: var(--ok); }
    .tp-session-duration {
      display: inline-flex; align-items: center; min-height: 21px; padding: 0 8px;
      border-radius: var(--r-pill); background: rgba(20,17,98,.06); color: var(--brand);
      font-size: .73rem; font-weight: 700; margin-top: 4px;
    }
    .tp-empty { color: var(--ink-soft); font-size: .9rem; }
    .tp-empty strong { display: block; font-size: .95rem; color: var(--ink); margin-bottom: 5px; }

    /* ---- Formulário de sessão (3 níveis) ---- */
    .tp-session-form-wrap { margin-top: var(--s3); border-top: 1px solid var(--border); padding-top: var(--s3); }
    .tp-session-form > summary {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px var(--s2); border: 1px solid var(--border); border-radius: var(--r);
      background: var(--paper); color: var(--ink);
      font-family: var(--font); font-size: .88rem; font-weight: 700;
      cursor: pointer; list-style: none; user-select: none;
    }
    .tp-session-form > summary::-webkit-details-marker { display: none; }
    .tp-session-form > summary:hover { border-color: var(--brand); }
    .tp-session-form > summary svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s ease; }
    .tp-session-form[open] > summary { border-radius: var(--r) var(--r) 0 0; border-color: var(--brand); }
    .tp-session-form[open] > summary svg { transform: rotate(180deg); }
    .tp-form-body {
      border: 1px solid var(--brand); border-top: none; border-radius: 0 0 var(--r) var(--r);
      padding: var(--s3); background: var(--surface); display: grid; gap: var(--s3);
    }
    .tp-form-section-title {
      font-size: .73rem; font-weight: 700; color: var(--ink-soft);
      text-transform: uppercase; letter-spacing: .08em;
      padding-bottom: var(--s1); border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .tp-form-row   { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: var(--s2); }
    .tp-form-row-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: var(--s2); }
    .tp-field { display: grid; gap: 6px; }
    .tp-field label { font-size: .8rem; font-weight: 700; color: var(--ink-soft); }
    .tp-field input, .tp-field textarea, .tp-field select {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--r-sm);
      background: var(--paper); color: var(--ink); font-family: var(--font); font-size: .9rem;
      transition: border-color .15s ease;
    }
    .tp-field input:focus-visible, .tp-field textarea:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; border-color: var(--brand); }
    .tp-field textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
    .tp-scale { display: flex; flex-wrap: wrap; gap: 6px; }
    .tp-scale-btn {
      display: inline-flex; align-items: center; min-height: 33px; padding: 0 11px;
      border: 1px solid var(--border); border-radius: var(--r-pill);
      background: var(--paper); color: var(--ink-soft);
      font-family: var(--font); font-size: .8rem; font-weight: 700; cursor: pointer;
      transition: border-color .15s ease, background .15s ease, color .15s ease;
    }
    .tp-scale-btn:hover { border-color: var(--brand); color: var(--brand); }
    .tp-scale-btn.selected      { border-color: var(--brand); background: rgba(20,17,98,.08); color: var(--brand); }
    .tp-scale-btn--ok.selected  { border-color: var(--ok); background: var(--ok-soft); color: var(--ok); }
    .tp-scale-btn--warn.selected{ border-color: var(--warn); background: var(--warn-soft); color: var(--warn); }
    .tp-scale-btn--bad.selected { border-color: var(--bad); background: var(--bad-soft); color: var(--bad); }
    .tp-family-guide {
      font-size: .83rem; color: var(--ink-soft); line-height: 1.55; padding: var(--s2);
      border-radius: var(--r-sm); background: rgba(20,17,98,.04); border-left: 3px solid var(--brand);
    }
    .tp-family-guide strong { color: var(--brand); display: block; margin-bottom: 4px; }
    .tp-family-guide em { font-size: .81rem; color: var(--ok); font-style: normal; display: block; margin-top: 6px; }
    .tp-char-count { font-size: .75rem; color: var(--ink-soft); text-align: right; margin-top: 4px; }
    .tp-checklist { list-style: none; display: grid; gap: 8px; }
    .tp-checklist li { display: flex; align-items: flex-start; gap: 9px; }
    .tp-checklist input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; accent-color: var(--brand); cursor: pointer; }
    .tp-checklist label { font-size: .87rem; color: var(--ink-soft); cursor: pointer; line-height: 1.4; }
    .tp-internal-wrap { border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; }
    .tp-internal-label {
      display: flex; align-items: center; gap: 8px; padding: 9px var(--s2);
      background: rgba(20,17,98,.04); border-bottom: 1px solid var(--border);
      font-size: .75rem; font-weight: 700; color: var(--ink-soft);
    }
    .tp-internal-label svg { width: 13px; height: 13px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tp-internal-wrap textarea { display: block; width: 100%; padding: var(--s2); border: none; background: var(--surface); color: var(--ink); font-family: var(--font); font-size: .88rem; min-height: 68px; resize: vertical; line-height: 1.5; }
    .tp-internal-wrap textarea:focus-visible { outline: 2px solid var(--brand); outline-offset: -2px; }
    .tp-form-actions { display: flex; align-items: center; flex-wrap: wrap; gap: var(--s2); }
    .tp-btn-save {
      display: inline-flex; align-items: center; gap: 7px;
      min-height: 42px; padding: 0 var(--s3); border: none; border-radius: var(--r-pill);
      background: var(--brand); color: #fff;
      font-family: var(--font); font-size: .9rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(20,17,98,.22); transition: transform .15s ease, box-shadow .15s ease;
    }
    .tp-btn-save:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(20,17,98,.3); }
    .tp-btn-save:disabled { opacity: .5; cursor: not-allowed; }
    .tp-form-ok    { font-size: .88rem; color: var(--ok); font-weight: 700; }
    .tp-form-error { font-size: .88rem; color: var(--bad); font-weight: 700; }

    /* ---- Plano (somente leitura) ---- */
    .tp-plan-entry { padding: 9px 0; border-bottom: 1px solid var(--border); }
    .tp-plan-entry:last-of-type { border-bottom: none; }
    .tp-plan-key { font-size: .71rem; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 3px; }
    .tp-plan-val { font-size: .9rem; color: var(--ink); line-height: 1.45; }
    .tp-btn-suggest {
      display: inline-flex; align-items: center; gap: 6px; margin-top: var(--s2);
      min-height: 31px; padding: 0 12px; border-radius: var(--r-pill);
      border: 1px solid var(--border); background: var(--paper);
      color: var(--ink-soft); font-family: var(--font); font-size: .8rem; font-weight: 700; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .tp-btn-suggest:hover { border-color: var(--brand); color: var(--brand); }

    /* ---- Atividade sugerida ---- */
    .tp-activity-note { font-size: .88rem; color: var(--ink-soft); line-height: 1.55; margin-bottom: var(--s2); }
    .tp-activity-link {
      display: inline-flex; align-items: center; gap: 6px;
      min-height: 31px; padding: 0 12px; border-radius: var(--r-pill);
      border: 1px solid var(--border-strong);
      color: var(--brand); font-size: .8rem; font-weight: 700; text-decoration: none;
      transition: background .15s;
    }
    .tp-activity-link:hover { background: rgba(20,17,98,.05); }

    /* ---- Ciclo pausado ---- */
    .tp-paused-banner {
      display: flex; gap: var(--s2); align-items: flex-start;
      padding: var(--s3); border-radius: var(--r-lg);
      background: var(--warn-soft); border: 1px solid rgba(179,89,10,.2);
    }
    .tp-paused-banner svg { width: 22px; height: 22px; flex-shrink: 0; margin-top: 2px; fill: none; stroke: var(--warn); stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .tp-paused-banner strong { display: block; font-size: .95rem; color: var(--warn); margin-bottom: 4px; }
    .tp-paused-banner p { font-size: .88rem; color: var(--ink-soft); margin: 0; }

    /* ---- Erro ---- */
    .tp-error-card { text-align: center; padding: var(--s4); }
    .tp-error-card strong { display: block; font-size: 1.05rem; color: var(--bad); margin-bottom: 6px; }
    .tp-error-card p { font-size: .9rem; color: var(--ink-soft); margin-bottom: var(--s3); }
    .tp-btn-retry {
      display: inline-flex; align-items: center; gap: 7px; min-height: 40px; padding: 0 var(--s3);
      border: 1px solid var(--border-strong); border-radius: var(--r-pill);
      background: var(--surface); color: var(--brand);
      font-family: var(--font); font-size: .9rem; font-weight: 700; cursor: pointer;
    }
    .tp-btn-retry:hover { background: rgba(20,17,98,.05); }

    /* ---- FAB mobile (só quando ciclo ativo) ---- */
    .tp-fab {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 50; display: none; align-items: center; gap: 8px;
      min-height: 50px; padding: 0 var(--s4);
      border: none; border-radius: var(--r-pill);
      background: var(--accent); color: var(--ink);
      font-family: var(--font); font-size: .95rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 8px 28px rgba(255,168,0,.4); white-space: nowrap;
    }
    .tp-fab svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    @media (max-width: 680px) { .tp-fab { display: inline-flex; } }

    /* ---- Modo Foco ---- */
    body.focus-mode .tp-topbar { box-shadow: none; }
    body.focus-mode .tp-hero-card { box-shadow: none; }
    body.focus-mode .tp-hero-card::before { opacity: 0; }
    body.focus-mode .tp-panel { box-shadow: none; }
    body.focus-mode .tp-next-card { box-shadow: none; }
    body.focus-mode .tp-strip { display: none; }

    /* ---- Responsivo ---- */
    @media (max-width: 900px) {
      .tp-dashboard-grid { grid-template-columns: 1fr; }
      .tp-right-column { grid-template-columns: 1fr; }
    }
    @media (max-width: 680px) {
      .tp-topbar-center { display: none; }
      .tp-main { padding: var(--s2) var(--s2) 90px; }
      .tp-hero-card { flex-direction: column; }
      .tp-form-row, .tp-form-row-3 { grid-template-columns: 1fr; }
      .tp-status-card { flex-direction: column; }
      .tp-btn-primary span { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body class="tutor-panel">

  <header class="tp-topbar" role="banner">
    <div class="tp-topbar-inner">
      <a class="tp-brand" href="../index.html" aria-label="Cognita Hub — início">
        <div class="tp-brand-mark">
          <img src="../assets/logo-icon-transparent.png" alt="" />
        </div>
        <div class="tp-brand-copy">
          <strong>Cognita Hub</strong>
          <small>Tutor voluntário</small>
        </div>
      </a>

      <div class="tp-topbar-center">
        <p class="tp-greeting" data-tutor-title>Carregando...</p>
      </div>

      <div class="tp-topbar-actions">
        <button class="tp-btn-primary" type="button" data-open-session hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          <span>Registrar sessão</span>
        </button>
        <button class="tp-icon-btn" type="button" data-focus-toggle aria-pressed="false" aria-label="Modo Foco">
          <i class="tp-focus-dot" aria-hidden="true"></i>
          <span class="sr-only" data-focus-label>Modo Foco</span>
        </button>
        <div class="tp-avatar" data-account-avatar aria-hidden="true">T</div>
        <button class="tp-icon-btn" type="button" data-logout aria-label="Sair da conta">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div data-tp-strip class="tp-strip" aria-live="polite" aria-atomic="true"></div>

  <main class="tp-main" id="main-content">
    <div data-tutor-state aria-live="polite">
      <div class="tp-skeleton tp-skeleton--hero"></div>
      <div class="tp-skeleton tp-skeleton--panel"></div>
    </div>
  </main>

  <div hidden>
    <span data-tutor-name></span>
    <span data-account-name></span>
    <span data-account-email></span>
  </div>

  <script type="module" src="../js/pages/tutor.js"></script>
</body>
</html>
