<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Tutor | CognitaHub</title>
    <link rel="icon" type="image/png" href="../assets/logo-icon-transparent.png" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/internal.css" />
    <link rel="stylesheet" href="../css/cognita-os.css" />
  </head>
  <body class="app-body os-body">
    <main class="os-page">
      <header class="os-topbar">
        <a class="os-brand" href="../index.html" aria-label="Voltar para o site Cognita Hub">
          <img src="../assets/logo-icon-transparent.png" alt="" aria-hidden="true" />
          <strong>Cognita Hub</strong>
        </a>

        <div class="os-topbar-copy">
          <p class="os-kicker">Tutor voluntário</p>
          <h1 data-tutor-title>Carregando...</h1>
          <p data-tutor-subtitle></p>
        </div>

        <div class="os-topbar-actions">
          <a class="os-icon-link" href="atividades.html" aria-label="Abrir recursos">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z" />
              <path d="M19 17H6a2 2 0 0 0-2 2" />
            </svg>
          </a>
          <button class="os-action-primary" type="button" data-open-session>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14" />
              <path d="M5 12h14" />
            </svg>
            <span>Registrar sessão</span>
          </button>
          <button class="os-icon-button focus-toggle" type="button" data-focus-toggle aria-pressed="false" aria-label="Alternar modo foco">
            <span class="sr-only" data-focus-label>Modo Foco</span>
            <i class="focus-dot" aria-hidden="true"></i>
          </button>
          <button class="os-icon-button" type="button" data-logout aria-label="Sair">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 12H5" />
              <path d="M12 19l-7-7 7-7" />
            </svg>
          </button>
          <div class="os-avatar" data-account-avatar>T</div>
        </div>
      </header>

      <section class="os-status-strip" aria-label="Resumo do tutor">
        <span class="os-status-pill os-status-live">
          <i aria-hidden="true"></i>
          <strong data-tutor-count>Carregando...</strong>
        </span>
        <span class="os-status-pill">próxima sessão pendente</span>
      </section>

      <section aria-label="Crianças acompanhadas">
        <div class="os-cycles" data-tutor-cycles aria-live="polite"></div>
        <div data-tutor-empty hidden></div>
      </section>

      <div class="os-hidden-identity" hidden>
        <span data-tutor-name></span>
        <span data-account-name></span>
        <span data-account-email></span>
      </div>
    </main>

    <script type="module" src="../js/pages/tutor.js"></script>
  </body>
</html>
