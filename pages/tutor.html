<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Tutor | CognitaHub</title>
    <link rel="icon" type="image/png" href="../assets/logo-icon-transparent.png" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/internal.css" />
  </head>
  <body class="app-body">
    <div class="app-shell">
      <aside class="sidebar" aria-label="Menu do tutor">
        <a class="sidebar-logo sidebar-logo-clean" href="../index.html">
          <img src="../assets/logo-retangular-transparent.png" alt="CognitaHub" />
        </a>

        <div class="sidebar-context">
          <span class="sidebar-role">Tutor voluntário</span>
          <strong data-tutor-name>Tutor</strong>
          <small data-tutor-count>Carregando…</small>
        </div>

        <p class="nav-label">Painel</p>

        <nav class="sidebar-nav">
          <a class="active" href="tutor.html">
            <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M3 11l9-8 9 8" />
              <path d="M5 10v10h14V10" />
            </svg>
            <span>Hoje</span>
          </a>
          <a href="atividades.html">
            <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z" />
              <path d="M19 17H6a2 2 0 0 0-2 2" />
            </svg>
            <span>Recursos</span>
          </a>
          <a class="nav-exit" href="#" data-logout>
            <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M19 12H5" />
              <path d="M12 19l-7-7 7-7" />
            </svg>
            <span>Sair</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="account">
            <div class="account-avatar" data-account-avatar>T</div>
            <div class="account-info">
              <strong data-account-name>Tutor</strong>
              <span data-account-email>—</span>
            </div>
          </div>

          <button class="focus-toggle" type="button" data-focus-toggle aria-pressed="false">
            <span data-focus-label>Modo Foco</span>
            <i class="focus-dot" aria-hidden="true"></i>
          </button>
        </div>
      </aside>

      <main class="app-main work-page">
        <header class="journey-header">
          <div>
            <p class="app-kicker">Tutor voluntário</p>
            <h1 class="app-title" data-tutor-title>Carregando…</h1>
            <p class="app-subtitle" data-tutor-subtitle></p>
          </div>
          <a class="back-site-link" href="../index.html">
            <span aria-hidden="true">←</span>
            Site Cognita
          </a>
        </header>

        <section aria-label="Crianças acompanhadas">
          <div data-tutor-cycles aria-live="polite"></div>
          <div data-tutor-empty hidden></div>
        </section>
      </main>
    </div>

    <nav class="bottom-nav" aria-label="Menu inferior">
      <a class="active" href="tutor.html">Hoje</a>
      <a href="atividades.html">Recursos</a>
      <a href="#" data-logout>Sair</a>
    </nav>

    <script type="module" src="/js/pages/tutor.js"></script>
  </body>
</html>
