<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Responsável | CognitaHub</title>
    <link rel="icon" type="image/png" href="../assets/logo-icon-transparent.png" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/internal.css" />
    <link rel="stylesheet" href="../css/cognita-os.css" />
  </head>

  <body class="app-body os-body">
    <main class="os-page">
      <header class="os-topbar">
        <a class="os-brand" href="../index.html" aria-label="Voltar para o site Cognita Hub">
          <img src="../assets/logo-icon-transparent.png" alt="" aria-hidden="true" />
          <strong>Cognita Hub</strong>
        </a>

        <div class="os-topbar-copy">
          <p class="os-kicker">Responsável e criança</p>
          <h1 data-guardian-title>Carregando...</h1>
          <p data-guardian-subtitle></p>
        </div>

        <div class="os-topbar-actions">
          <a class="os-icon-link" href="atividades.html" aria-label="Abrir atividades">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 11l3 3L22 4" />
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
            </svg>
          </a>

          <a class="os-action-primary" href="#sessoes">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 19V5" />
              <path d="M4 19h16" />
              <path d="M8 15l3-3 3 2 5-6" />
            </svg>
            <span>Ver acompanhamento</span>
          </a>

          <button class="os-icon-button focus-toggle" type="button" data-focus-toggle aria-pressed="false" aria-label="Alternar modo foco">
            <span class="sr-only" data-focus-label>Modo Foco</span>
            <i class="focus-dot" aria-hidden="true"></i>
          </button>

          <button class="os-icon-button" type="button" data-logout aria-label="Sair">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 12H5" />
              <path d="M12 19l-7-7 7-7" />
            </svg>
          </button>

          <div class="os-avatar" data-account-avatar>R</div>
        </div>
      </header>

      <section class="os-status-strip" aria-label="Resumo do responsável">
        <span class="os-status-pill os-status-live">
          <i aria-hidden="true"></i>
          <strong data-guardian-count>Carregando...</strong>
        </span>
        <span class="os-status-pill">acompanhamento familiar</span>
      </section>

      <section aria-label="Cadastros das crianças">
        <div class="os-cycles" data-guardian-children aria-live="polite"></div>
        <div data-guardian-empty hidden></div>
      </section>

      <div class="os-hidden-identity" hidden>
        <span data-guardian-name></span>
        <span data-account-name></span>
        <span data-account-email></span>
      </div>
    </main>

    <script type="module" src="../js/pages/responsavel.js"></script>
  </body>
</html>
