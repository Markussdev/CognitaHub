<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca de Atividades | Cognita Hub</title>
  <link rel="icon" type="image/png" href="../assets/logo-icon-transparent.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #2d1739; --ink-soft: #5b4a58; --muted: #8a8391;
      --canvas: #f7f4ee; --card: #fffefc; --rail: #f4f0f6;
      --brand: #141162; --brand-deep: #3b0a35; --brand-soft: #ece8f8; --accent: #ffa800;
      --ok: #1c7c54; --ok-soft: #e8f2ed;
      --warn: #b3590a; --warn-soft: #fbf0e6;
      --bad: #a3123a; --bad-soft: rgba(163,18,58,.08);
      --line: rgba(32,26,102,.10); --line-2: rgba(32,26,102,.18);
      --shadow: 0 1px 2px rgba(45,23,57,.06);
      --r: 14px; --r-sm: 10px; --r-lg: 20px; --pill: 999px;
      --font: "Atkinson Hyperlegible", system-ui, -apple-system, "Segoe UI", sans-serif;
      --baloo: "Baloo 2", var(--font);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    body { font-family: var(--font); color: var(--ink); background: var(--canvas); font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    svg { fill: none; stroke: currentColor; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
    :focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 4px; }
    a { color: inherit; }
    [hidden] { display: none !important; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
    .thin-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .thin-scroll::-webkit-scrollbar { display: none; }

    /* ── App shell ── */
    .app { display: grid; grid-template-columns: 212px 1fr; height: 100vh; }

    /* ── Rail ── */
    .rail { background: var(--rail); border-right: 1px solid var(--line); display: flex; flex-direction: column; padding: 14px 12px; height: 100vh; overflow-y: auto; }
    .rail-brand { display: flex; align-items: center; gap: 9px; padding: 4px 6px 14px; text-decoration: none; }
    .rail-mark { width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; overflow: hidden; }
    .rail-mark img { width: 100%; height: 100%; object-fit: contain; }
    .rail-brand b { font-size: .9rem; letter-spacing: -.01em; color: var(--ink); }
    .rail-brand small { display: block; font-size: .66rem; color: var(--muted); font-weight: 700; }
    .rail-group { font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); padding: 14px 8px 6px; }
    .rail-link { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--r-sm); color: var(--ink-soft); text-decoration: none; font-size: .86rem; font-weight: 700; }
    .rail-link svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
    .rail-link:hover { background: rgba(32,26,102,.05); }
    .rail-link.active { background: var(--brand-soft); color: var(--brand); }
    .rail-link.active svg { color: var(--brand); }
    .rail-spacer { flex: 1; }
    .rail-account { display: flex; align-items: center; gap: 6px; padding: 8px; border-top: 1px solid var(--line); margin-top: 8px; }
    .rail-account .av { width: 28px; height: 28px; border-radius: 50%; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: .72rem; flex-shrink: 0; overflow: hidden; }
    .av img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
    .rail-account .nm { font-size: .8rem; font-weight: 700; line-height: 1.15; color: var(--ink); }
    .rail-account .rl { font-size: .68rem; color: var(--muted); }

    /* ── Shell / topbar ── */
    .shell { display: flex; flex-direction: column; min-width: 0; height: 100vh; overflow: hidden; }
    .topbar { flex-shrink: 0; display: flex; align-items: center; gap: 16px; height: 52px; padding: 0 22px; border-bottom: 1px solid var(--line); background: rgba(248,247,246,.85); backdrop-filter: blur(6px); z-index: 10; }
    #main-content { flex: 1; min-height: 0; overflow-y: auto; }
    .crumb { font-size: .82rem; color: var(--muted); }
    .crumb b { color: var(--ink); font-weight: 700; }
    .search { flex: 1; max-width: 420px; display: flex; align-items: center; gap: 8px; height: 34px; padding: 0 11px; border: 1px solid var(--line-2); border-radius: var(--r-sm); background: var(--card); color: var(--muted); font-size: .84rem; font-family: var(--font); cursor: pointer; border: none; outline: none; }
    .search-wrap { flex: 1; max-width: 420px; display: flex; align-items: center; gap: 8px; height: 34px; padding: 0 11px; border: 1px solid var(--line-2); border-radius: var(--r-sm); background: var(--card); }
    .search-wrap svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--muted); }
    .search-wrap input { flex: 1; border: none; background: none; font-family: var(--font); font-size: .84rem; color: var(--ink); outline: none; }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap:focus-within { border-color: var(--brand); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .topbar-right .av { width: 30px; height: 30px; border-radius: 50%; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: .74rem; flex-shrink: 0; overflow: hidden; }

    /* ── Biblioteca: cabeçalho ── */
    .lib-head { padding: 22px 26px 0; }
    .lib-head .kicker { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .lib-head h1 { margin-top: 4px; font-size: 1.5rem; font-weight: 800; color: var(--brand-deep); font-family: var(--baloo); letter-spacing: -.02em; line-height: 1.15; }

    /* ── Filtros ── */
    .lib-filters { padding: 16px 26px 0; display: flex; flex-direction: column; gap: 10px; }
    .filter-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
    .filter-row-label { font-size: .64rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; width: 66px; flex-shrink: 0; }
    .fchip { height: 28px; padding: 0 12px; border-radius: var(--pill); border: 1px solid var(--line-2); background: var(--card); color: var(--muted); font-family: var(--font); font-size: .77rem; font-weight: 700; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; }
    .fchip:hover { border-color: var(--brand); color: var(--brand); }
    .fchip.on { background: var(--brand-soft); border-color: transparent; color: var(--brand); }
    .filter-sep { height: 1px; background: var(--line); }

    /* ── Grade de cards ── */
    .lib-grid { padding: 18px 26px 60px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; align-items: start; }

    /* ── Card de atividade ── */
    .activity-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r); box-shadow: var(--shadow); padding: 16px; display: flex; flex-direction: column; gap: 10px; cursor: pointer; width: 100%; text-align: left; font-family: var(--font); transition: border-color .15s, box-shadow .15s; }
    .activity-card:hover { border-color: var(--line-2); box-shadow: 0 4px 18px rgba(20,17,98,.1); }
    .activity-card:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
    .ac-skill { display: inline-flex; align-items: center; height: 22px; padding: 0 9px; border-radius: var(--pill); background: var(--brand-soft); color: var(--brand); font-size: .7rem; font-weight: 700; align-self: flex-start; }
    .ac-title { font-size: 1.02rem; font-weight: 700; color: var(--ink); font-family: var(--baloo); line-height: 1.25; }
    .ac-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .ac-meta-item { display: flex; align-items: center; gap: 4px; font-size: .74rem; color: var(--muted); font-weight: 700; }
    .ac-meta-item svg { width: 13px; height: 13px; flex-shrink: 0; }
    .ac-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .acb { display: inline-flex; align-items: center; height: 20px; padding: 0 7px; border-radius: var(--pill); font-size: .68rem; font-weight: 700; }
    .acb-ok { background: var(--ok-soft); color: var(--ok); }
    .acb-warn { background: var(--warn-soft); color: var(--warn); }
    .acb-bad { background: var(--bad-soft); color: var(--bad); }
    .acb-soft { background: rgba(20,17,98,.06); color: var(--ink-soft); }
    .ac-footer { margin-top: auto; display: flex; justify-content: flex-end; }
    .btn-ghost-sm { height: 30px; padding: 0 12px; border-radius: var(--r-sm); background: var(--card); color: var(--brand); border: 1px solid var(--line-2); font-family: var(--font); font-size: .8rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
    .btn-ghost-sm:hover { background: rgba(20,17,98,.04); }
    .btn-ghost-sm svg { width: 13px; height: 13px; }
    .btn-brand-sm { height: 30px; padding: 0 12px; border-radius: var(--r-sm); background: var(--brand); color: #fff; border: none; font-family: var(--font); font-size: .8rem; font-weight: 700; cursor: pointer; }

    /* ── Estado vazio ── */
    .lib-empty { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; padding: 48px 20px; }
    .lib-empty strong { font-size: .95rem; color: var(--ink); }
    .lib-empty span { font-size: .84rem; color: var(--muted); max-width: 36ch; line-height: 1.55; }
    .lib-empty button { margin-top: 8px; }

    /* ── Gaveta de atividade ── */
    .drawer-backdrop { position: fixed; inset: 0; background: rgba(45,23,57,.28); z-index: 60; opacity: 0; pointer-events: none; transition: opacity .2s ease; }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
    .act-drawer { position: fixed; top: 0; right: 0; height: 100vh; width: min(500px, 94vw); background: var(--card); border-left: 1px solid var(--line); box-shadow: -16px 0 36px rgba(45,23,57,.14); z-index: 61; transform: translateX(110%); transition: transform .25s ease; display: flex; flex-direction: column; }
    .act-drawer.open { transform: translateX(0); }
    .ad-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 20px 22px 16px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
    .ad-head h2 { font-size: 1.2rem; font-weight: 800; color: var(--brand-deep); font-family: var(--baloo); line-height: 1.2; margin-bottom: 10px; }
    .ad-body { flex: 1; overflow-y: auto; padding-bottom: 80px; }
    .ds { padding: 18px 22px 0; }
    .ds + .ds { padding-top: 16px; }
    .ds-label { font-size: .63rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: 6px; display: block; }
    .ds-obj { font-size: .93rem; font-weight: 700; color: var(--ink); line-height: 1.45; padding: 12px 15px; background: rgba(20,17,98,.03); border-left: 3px solid var(--brand); border-radius: var(--r-sm); }
    .ds p { font-size: .88rem; color: var(--ink-soft); line-height: 1.55; }
    .ds ul, .ds ol { padding-left: 18px; display: flex; flex-direction: column; gap: 5px; }
    .ds li { font-size: .88rem; color: var(--ink-soft); line-height: 1.5; }
    .ds-adapt { padding: 18px 22px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .ds-adapt-box { padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--r-sm); }
    .ds-adapt-box .lbl { font-size: .63rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; display: block; }
    .ds-adapt-box p { font-size: .84rem; color: var(--ink-soft); line-height: 1.45; }
    .hard { border-left: 3px solid var(--warn); }
    .hard .lbl { color: var(--warn); }
    .easy { border-left: 3px solid var(--ok); }
    .easy .lbl { color: var(--ok); }
    .ds-signal { font-size: .88rem; color: var(--ink-soft); line-height: 1.55; padding: 12px 15px; background: var(--ok-soft); border-radius: var(--r-sm); border-left: 3px solid var(--ok); }
    .ds-say { display: flex; flex-direction: column; gap: 6px; }
    .ds-say-item { font-size: .86rem; color: var(--brand-deep); font-style: italic; padding: 8px 12px; background: rgba(20,17,98,.04); border-radius: var(--r-sm); }
    .ds-avoid { display: flex; flex-direction: column; gap: 5px; }
    .ds-avoid-item { display: flex; align-items: flex-start; gap: 7px; font-size: .86rem; color: var(--ink-soft); line-height: 1.4; }
    .ds-avoid-item::before { content: '✕'; font-size: .7rem; color: var(--bad); font-weight: 700; flex-shrink: 0; margin-top: 3px; }
    .ds-obs { font-size: .86rem; color: var(--warn); line-height: 1.5; padding: 10px 14px; background: var(--warn-soft); border-radius: var(--r-sm); border-left: 3px solid var(--warn); }
    .ad-footer { position: sticky; bottom: 0; padding: 14px 22px; border-top: 1px solid var(--line); background: var(--card); display: flex; gap: 8px; align-items: center; }
    .btn-disabled { height: 34px; padding: 0 14px; border-radius: var(--r-sm); background: rgba(20,17,98,.05); color: var(--muted); border: 1px dashed var(--line-2); font-family: var(--font); font-size: .82rem; font-weight: 700; cursor: default; display: inline-flex; align-items: center; gap: 6px; }
    .btn-disabled svg { width: 14px; height: 14px; }
    .icon-btn { display: grid; place-items: center; width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--line-2); background: var(--card); color: var(--ink-soft); cursor: pointer; }
    .icon-btn svg { width: 15px; height: 15px; }
    .icon-btn:hover { border-color: var(--brand); color: var(--brand); }
    .ad-sep { height: 1px; background: var(--line); margin: 16px 22px 0; }

    /* ── Responsive ── */
    @media (max-width: 1100px) { .lib-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 940px) {
      .app { grid-template-columns: 1fr; }
      .rail { display: none; }
      .lib-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); padding-left: 16px; padding-right: 16px; }
      .lib-head, .lib-filters { padding-left: 16px; padding-right: 16px; }
    }
    @media (max-width: 600px) {
      .lib-grid { grid-template-columns: 1fr; }
      .ds-adapt { grid-template-columns: 1fr; }
      .act-drawer { width: 100vw; }
    }
  </style>
</head>
<body>
<div class="app">

  <nav class="rail thin-scroll" aria-label="Navegação">
    <a class="rail-brand" href="../index.html">
      <div class="rail-mark"><img src="../assets/logo-icon-transparent.png" alt="" /></div>
      <div><b>Cognita Hub</b><small data-rail-role>Tutor</small></div>
    </a>

    <div class="rail-group">Navegação</div>
    <a class="rail-link" href="#" data-rail-back>
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      Início
    </a>

    <div class="rail-group">Recursos</div>
    <a class="rail-link active" href="atividades.html">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Biblioteca
    </a>

    <div class="rail-spacer"></div>
    <div class="rail-account">
      <div class="av" data-account-avatar aria-hidden="true">?</div>
      <div><div class="nm" data-account-name>Carregando…</div><div class="rl" data-account-role>—</div></div>
    </div>
  </nav>

  <div class="shell">
    <div class="topbar">
      <div class="crumb">Biblioteca</div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input type="text" id="lib-search" placeholder="Buscar atividade…" autocomplete="off" aria-label="Buscar atividade" />
      </div>
      <div class="topbar-right">
        <div class="av" data-topbar-avatar aria-hidden="true">?</div>
      </div>
    </div>

    <main id="main-content" class="thin-scroll">
      <div class="lib-head">
        <p class="kicker">Biblioteca</p>
        <h1>Atividades de matemática inicial</h1>
      </div>

      <div class="lib-filters" id="lib-filters" aria-label="Filtrar atividades"></div>

      <div class="lib-grid" id="lib-grid" aria-label="Atividades" aria-live="polite"></div>
    </main>
  </div>
</div>

<div class="drawer-backdrop" id="drawer-backdrop"></div>
<aside class="act-drawer thin-scroll" id="act-drawer" aria-hidden="true" aria-label="Detalhes da atividade">
  <div class="ad-head">
    <div id="ad-head-content"></div>
    <button class="icon-btn" id="drawer-close" type="button" aria-label="Fechar">
      <svg viewBox="0 0 24 24"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="ad-body thin-scroll" id="ad-body"></div>
  <div class="ad-footer" id="ad-footer"></div>
</aside>

<script type="module" src="../js/pages/atividades.js"></script>
</body>
</html>
