<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil Pedagógico | CognitaHub</title>
    <link rel="icon" type="image/png" href="../assets/logo-icon-transparent.png" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/internal.css" />
    <link rel="stylesheet" href="../css/cognita-os.css" />
  </head>
  <body class="app-body os-body profile-os-body">
    <main class="os-page profile-os-page">
      <header class="os-topbar">
        <a class="os-brand" href="../index.html" aria-label="Voltar para o site Cognita Hub">
          <img src="../assets/logo-icon-transparent.png" alt="" aria-hidden="true" />
          <strong>Cognita Hub</strong>
        </a>

        <div class="os-topbar-copy">
          <p class="os-kicker">Perfil pedagógico</p>
          <h1 data-profile-name>Carregando…</h1>
          <p data-profile-subtitle></p>
        </div>

        <div class="os-topbar-actions">
          <a class="os-link-btn" href="responsavel.html" data-back-link>
            <span aria-hidden="true">←</span>
            Voltar ao painel
          </a>
          <button class="os-icon-button focus-toggle" type="button" data-focus-toggle aria-pressed="false" aria-label="Alternar modo foco">
            <span class="sr-only" data-focus-label>Modo Foco</span>
            <i class="focus-dot" aria-hidden="true"></i>
          </button>
          <button class="os-icon-button" type="button" data-logout aria-label="Sair">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 12H5" />
              <path d="M12 19l-7-7 7-7" />
            </svg>
          </button>
          <div class="os-avatar" data-account-avatar>C</div>
        </div>
      </header>

      <section aria-label="Perfil da criança">
        <div data-profile-content aria-live="polite"></div>
        <div data-profile-empty hidden></div>
      </section>

      <div class="os-hidden-identity" hidden>
        <span data-account-name></span>
        <span data-account-email></span>
      </div>
    </main>

    <script type="module" src="../js/pages/perfil-crianca.js"></script>
  </body>
</html>
